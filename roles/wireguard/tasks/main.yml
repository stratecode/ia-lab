- name: Install WireGuard packages
  ansible.builtin.apt:
    name:
      - wireguard
      - wireguard-tools
      - qrencode
    state: present
  when: wireguard_enabled

- name: Ensure WireGuard directories exist
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    owner: root
    group: root
    mode: "{{ item.mode }}"
  loop:
    - { path: /etc/wireguard, mode: "0700" }
    - { path: /etc/wireguard/clients, mode: "0700" }
  when: wireguard_enabled

- name: Enable IPv4 forwarding for WireGuard
  ansible.builtin.copy:
    dest: /etc/sysctl.d/99-wireguard-forward.conf
    mode: "0644"
    content: |
      net.ipv4.ip_forward = 1
  notify: Restart wireguard
  when: wireguard_enabled

- name: Apply WireGuard sysctl settings
  ansible.builtin.command: sysctl --system
  changed_when: false
  when: wireguard_enabled

- name: Generate WireGuard server private key if missing
  ansible.builtin.shell: |
    umask 077
    wg genkey > /etc/wireguard/server.key
  args:
    creates: /etc/wireguard/server.key
  when: wireguard_enabled

- name: Generate WireGuard server public key
  ansible.builtin.shell: |
    umask 077
    wg pubkey < /etc/wireguard/server.key > /etc/wireguard/server.pub
  args:
    creates: /etc/wireguard/server.pub
  when: wireguard_enabled

- name: Read WireGuard server keys
  ansible.builtin.slurp:
    src: "{{ item }}"
  loop:
    - /etc/wireguard/server.key
    - /etc/wireguard/server.pub
  register: wireguard_server_key_files
  when: wireguard_enabled

- name: Set WireGuard server key facts
  ansible.builtin.set_fact:
    wireguard_server_private_key: "{{ wireguard_server_key_files.results[0].content | b64decode | trim }}"
    wireguard_server_public_key: "{{ wireguard_server_key_files.results[1].content | b64decode | trim }}"
  when: wireguard_enabled

- name: Generate WireGuard client private keys if missing
  ansible.builtin.shell: |
    umask 077
    wg genkey > /etc/wireguard/clients/{{ item.name }}.key
  args:
    creates: "/etc/wireguard/clients/{{ item.name }}.key"
  loop: "{{ wireguard_clients }}"
  when: wireguard_enabled

- name: Generate WireGuard client public keys
  ansible.builtin.shell: |
    umask 077
    wg pubkey < /etc/wireguard/clients/{{ item.name }}.key > /etc/wireguard/clients/{{ item.name }}.pub
  args:
    creates: "/etc/wireguard/clients/{{ item.name }}.pub"
  loop: "{{ wireguard_clients }}"
  when: wireguard_enabled

- name: Read WireGuard client keys
  ansible.builtin.slurp:
    src: "/etc/wireguard/clients/{{ item.name }}.pub"
  loop: "{{ wireguard_clients }}"
  register: wireguard_client_public_key_files
  when: wireguard_enabled

- name: Build WireGuard client public key map
  ansible.builtin.set_fact:
    wireguard_client_public_keys: "{{ wireguard_client_public_keys | default({}) | combine({item.item.name: (item.content | b64decode | trim)}) }}"
  loop: "{{ wireguard_client_public_key_files.results }}"
  when: wireguard_enabled

- name: Install WireGuard server config
  ansible.builtin.copy:
    dest: "/etc/wireguard/{{ wireguard_interface }}.conf"
    owner: root
    group: root
    mode: "0600"
    content: |
      [Interface]
      Address = {{ wireguard_server_address }}
      ListenPort = {{ wireguard_listen_port }}
      PrivateKey = {{ wireguard_server_private_key }}
      SaveConfig = false
      PostUp = iptables -A FORWARD -i {{ wireguard_interface }} -j ACCEPT; iptables -A FORWARD -o {{ ansible_facts['default_ipv4']['interface'] }} -j ACCEPT; iptables -t nat -A POSTROUTING -o {{ ansible_facts['default_ipv4']['interface'] }} -j MASQUERADE
      PostDown = iptables -D FORWARD -i {{ wireguard_interface }} -j ACCEPT; iptables -D FORWARD -o {{ ansible_facts['default_ipv4']['interface'] }} -j ACCEPT; iptables -t nat -D POSTROUTING -o {{ ansible_facts['default_ipv4']['interface'] }} -j MASQUERADE
      {% for client in wireguard_clients %}

      [Peer]
      PublicKey = {{ wireguard_client_public_keys[client.name] }}
      AllowedIPs = {{ client.address }}
      PersistentKeepalive = {{ wireguard_persistent_keepalive }}
      {% endfor %}
  notify:
    - Reload systemd for wireguard
    - Restart wireguard
  when: wireguard_enabled

- name: Read WireGuard client private keys
  ansible.builtin.slurp:
    src: "/etc/wireguard/clients/{{ item.name }}.key"
  loop: "{{ wireguard_clients }}"
  register: wireguard_client_private_key_files
  when: wireguard_enabled

- name: Build WireGuard client private key map
  ansible.builtin.set_fact:
    wireguard_client_private_keys: "{{ wireguard_client_private_keys | default({}) | combine({item.item.name: (item.content | b64decode | trim)}) }}"
  loop: "{{ wireguard_client_private_key_files.results }}"
  when: wireguard_enabled

- name: Install WireGuard client configs
  ansible.builtin.copy:
    dest: "/etc/wireguard/clients/{{ item.name }}.conf"
    owner: root
    group: root
    mode: "0600"
    content: |
      [Interface]
      Address = {{ item.address }}
      PrivateKey = {{ wireguard_client_private_keys[item.name] }}
      DNS = {{ wireguard_dns_servers | join(', ') }}

      [Peer]
      PublicKey = {{ wireguard_server_public_key }}
      Endpoint = {{ wireguard_endpoint }}:{{ wireguard_endpoint_port }}
      AllowedIPs = {{ wireguard_allowed_ips | join(', ') }}
      PersistentKeepalive = {{ wireguard_persistent_keepalive }}
  loop: "{{ wireguard_clients }}"
  when: wireguard_enabled

- name: Ensure WireGuard service is enabled and started
  ansible.builtin.systemd:
    name: "wg-quick@{{ wireguard_interface }}"
    state: started
    enabled: true
  when: wireguard_enabled
