- name: Reload systemd for llama.cpp
  ansible.builtin.systemd:
    daemon_reload: true
  when: llama_cpp_enabled and not ansible_check_mode

- name: Restart llama.cpp services
  ansible.builtin.systemd:
    name: "{{ item.service_name }}"
    state: restarted
    enabled: true
  loop: "{{ llama_cpp_instances }}"
  when: llama_cpp_enabled and not ansible_check_mode

- name: Restart single llama.cpp instance
  ansible.builtin.systemd:
    name: "{{ llama_cpp_restart_instance }}"
    state: restarted
    daemon_reload: true
  when: llama_cpp_enabled and not ansible_check_mode
