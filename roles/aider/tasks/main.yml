# ─── User, Directories, and Permissions ──────────────────────────────────────
# Validates: Requirements 2.1, 2.2, 2.3, 2.4, 2.5, 2.6, 18.1, 18.2, 18.4, 18.5

- name: Ensure aider group exists
  ansible.builtin.group:
    name: aider
    system: true
    state: present
  when: aider_enabled

- name: Ensure aider user exists
  ansible.builtin.user:
    name: aider
    group: aider
    system: true
    create_home: true
    home: /srv/ai-lab/aider
    shell: /usr/sbin/nologin
    state: present
  when: aider_enabled

- name: Ensure aider directories exist
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    owner: "{{ item.owner }}"
    group: "{{ item.group }}"
    mode: "{{ item.mode }}"
  loop:
    - { path: /srv/ai-lab/aider/workspaces, owner: aider, group: aider, mode: "0755" }
    - { path: /srv/ai-lab/repos, owner: aider, group: aider, mode: "0755" }
    - { path: /var/log/aider, owner: aider, group: aider, mode: "0755" }
    - { path: /run/aider, owner: aider, group: aider, mode: "0755" }
    - { path: /etc/aider, owner: root, group: aider, mode: "0750" }
    - { path: /srv/ai-lab/aider/.ansible/tmp, owner: aider, group: aider, mode: "0700" }
  when: aider_enabled

- name: Configure git identity for aider user
  ansible.builtin.copy:
    dest: /srv/ai-lab/aider/.gitconfig
    owner: aider
    group: aider
    mode: "0644"
    content: |
      [user]
          name = Aider Agent
          email = aider@{{ domain }}
  when: aider_enabled

- name: Restrict aider user from accessing SSH private keys
  ansible.builtin.command:
    argv:
      - setfacl
      - -m
      - u:aider:---
      - "{{ item }}"
  loop:
    - /root/.ssh
    - /home/{{ docker_user }}/.ssh
  changed_when: false
  failed_when: false
  when: aider_enabled

- name: Restrict aider user from accessing .env and vault files
  ansible.builtin.command:
    argv:
      - setfacl
      - -m
      - u:aider:---
      - "{{ item }}"
  loop:
    - /home/{{ docker_user }}/.env
    - /home/{{ docker_user }}/group_vars/vault.yml
  changed_when: false
  failed_when: false
  when: aider_enabled

# ─── Systemd Cleanup Timer ───────────────────────────────────────────────────
# Validates: Requirements 9.3

- name: Deploy aider-cleanup.timer unit
  ansible.builtin.copy:
    dest: /etc/systemd/system/aider-cleanup.timer
    owner: root
    group: root
    mode: "0644"
    content: |
      [Unit]
      Description=Aider workspace cleanup timer

      [Timer]
      OnCalendar=hourly
      Persistent=true

      [Install]
      WantedBy=timers.target
  when: aider_enabled
  notify: Restart aider-cleanup timer

- name: Deploy aider-cleanup.service unit
  ansible.builtin.copy:
    dest: /etc/systemd/system/aider-cleanup.service
    owner: root
    group: root
    mode: "0644"
    content: |
      [Unit]
      Description=Aider workspace cleanup

      [Service]
      Type=oneshot
      User=aider
      Group=aider
      ExecStart=/usr/local/bin/aider-cleanup
  when: aider_enabled

- name: Enable and start aider-cleanup.timer
  ansible.builtin.systemd_service:
    name: aider-cleanup.timer
    enabled: true
    state: started
    daemon_reload: true
  when:
    - aider_enabled
    - not ansible_check_mode

# ─── Logrotate ───────────────────────────────────────────────────────────────
# Validates: Requirements 12.5

- name: Deploy logrotate configuration for aider logs
  ansible.builtin.copy:
    dest: /etc/logrotate.d/aider
    owner: root
    group: root
    mode: "0644"
    content: |
      /var/log/aider/*.json {
          daily
          rotate 30
          maxsize 500M
          compress
          delaycompress
          missingok
          notifempty
          create 0644 aider aider
      }
  when: aider_enabled

# ─── Repository Validation and Configuration ─────────────────────────────────
# Validates: Requirements 3.2, 3.3, 3.4, 3.5, 10.4

- name: Check repository paths exist
  ansible.builtin.stat:
    path: "{{ item.repo_path }}"
  loop: "{{ aider_repositories }}"
  loop_control:
    label: "{{ item.repo_name }}"
  register: aider_repo_paths
  when: aider_enabled

- name: Check repositories contain .git directory
  ansible.builtin.stat:
    path: "{{ item.repo_path }}/.git"
  loop: "{{ aider_repositories }}"
  loop_control:
    label: "{{ item.repo_name }}"
  register: aider_repo_git_dirs
  when: aider_enabled

- name: Build valid repositories list
  ansible.builtin.set_fact:
    aider_valid_repositories: >-
      {{ aider_repositories | zip(aider_repo_paths.results, aider_repo_git_dirs.results)
         | selectattr('1.stat.exists', 'equalto', true)
         | selectattr('2.stat.exists', 'equalto', true)
         | map(attribute='0')
         | list }}
    aider_invalid_repositories: >-
      {{ aider_repositories | zip(aider_repo_paths.results, aider_repo_git_dirs.results)
         | rejectattr('1.stat.exists', 'equalto', true)
         | map(attribute='0')
         | list
         +
         aider_repositories | zip(aider_repo_paths.results, aider_repo_git_dirs.results)
         | selectattr('1.stat.exists', 'equalto', true)
         | rejectattr('2.stat.exists', 'equalto', true)
         | map(attribute='0')
         | list }}
  when: aider_enabled

- name: Warn about invalid repositories
  ansible.builtin.debug:
    msg: >-
      WARNING: Repository '{{ item.repo_name }}' at '{{ item.repo_path }}'
      does not exist or is not a valid git repository — skipping.
  loop: "{{ aider_invalid_repositories | default([]) }}"
  loop_control:
    label: "{{ item.repo_name }}"
  when:
    - aider_enabled
    - aider_invalid_repositories | default([]) | length > 0

- name: Configure receive.denyCurrentBranch on valid repositories
  ansible.builtin.command:
    argv:
      - git
      - config
      - receive.denyCurrentBranch
      - ignore
    chdir: "{{ item.repo_path }}"
  loop: "{{ aider_valid_repositories | default([]) }}"
  loop_control:
    label: "{{ item.repo_name }}"
  changed_when: false
  when:
    - aider_enabled
    - aider_valid_repositories | default([]) | length > 0

- name: Deploy pre-receive hook to protect branches
  ansible.builtin.copy:
    dest: "{{ item.repo_path }}/.git/hooks/pre-receive"
    owner: aider
    group: aider
    mode: "0755"
    content: |
      #!/bin/bash
      # Reject pushes to protected branches from aider user
      PROTECTED_BRANCHES="{{ aider_protected_branches | join(' ') }}"
      while read oldrev newrev refname; do
        branch=$(echo "$refname" | sed 's|refs/heads/||')
        for protected in $PROTECTED_BRANCHES; do
          if [ "$branch" = "$protected" ] && [ "$(whoami)" = "aider" ]; then
            echo "ERROR: Push to protected branch '$branch' rejected for aider user"
            exit 1
          fi
        done
      done
  loop: "{{ aider_valid_repositories | default([]) }}"
  loop_control:
    label: "{{ item.repo_name }}"
  when:
    - aider_enabled
    - aider_valid_repositories | default([]) | length > 0

# ─── Prerequisites Validation ────────────────────────────────────────────────
# Validates: Requirement 18.6

- name: Verify git is installed
  ansible.builtin.command:
    argv:
      - git
      - --version
  changed_when: false
  when: aider_enabled

- name: Check llama.cpp coding instance is reachable
  ansible.builtin.uri:
    url: "{{ aider_api_base | regex_replace('/v1$', '') }}/health"
    method: GET
    timeout: 10
  register: aider_llama_health
  failed_when: false
  when: aider_enabled

- name: Warn if llama.cpp coding instance is not reachable
  ansible.builtin.debug:
    msg: >-
      WARNING: llama.cpp coding instance at {{ aider_api_base }} is not reachable
      (status={{ aider_llama_health.status | default('unreachable') }}).
      Aider will be installed but may not function until the inference endpoint is available.
  when:
    - aider_enabled
    - aider_llama_health.status is not defined or aider_llama_health.status != 200

# ─── Aider Installation ──────────────────────────────────────────────────────
# Validates: Requirements 1.1, 1.2, 1.3, 1.4, 1.5, 1.6

- name: Install pipx and build dependencies via apt
  ansible.builtin.apt:
    name:
      - python3-dev
      - python3-setuptools
      - build-essential
    state: present
  when: aider_enabled

- name: Install uv package manager
  ansible.builtin.shell:
    cmd: curl -LsSf https://astral.sh/uv/install.sh | sh
    creates: /root/.local/bin/uv
  environment:
    UV_INSTALL_DIR: /usr/local/bin
  when:
    - aider_enabled
    - not ansible_check_mode

- name: Ensure pipx path is available for aider user
  ansible.builtin.command:
    argv:
      - uv
      - python
      - install
      - "3.12"
  changed_when: false
  when:
    - aider_enabled
    - not ansible_check_mode

- name: Install Aider via uv tool for aider user
  ansible.builtin.command:
    argv:
      - uv
      - tool
      - install
      - --force
      - --python
      - python3.12
      - aider-chat@latest
  environment:
    HOME: /srv/ai-lab/aider
    UV_TOOL_DIR: /srv/ai-lab/aider/.local/share/uv/tools
    UV_TOOL_BIN_DIR: /srv/ai-lab/aider/.local/bin
    XDG_DATA_HOME: /srv/ai-lab/aider/.local/share
  register: aider_uv_install
  changed_when: "'Installed' in aider_uv_install.stdout"
  failed_when:
    - aider_uv_install.rc != 0
    - "'already installed' not in aider_uv_install.stderr"
  when:
    - aider_enabled
    - not ansible_check_mode

- name: Set ownership of aider local directory
  ansible.builtin.file:
    path: /srv/ai-lab/aider/.local
    state: directory
    owner: aider
    group: aider
    recurse: true
  when: aider_enabled

# ─── Aider Environment Configuration ────────────────────────────────────────
# Deploys a .env file in the aider user's home that Aider reads for
# API base URL, API key, model name, edit format, and non-interactive mode.

- name: Deploy Aider environment configuration
  ansible.builtin.copy:
    dest: /srv/ai-lab/aider/.env
    owner: aider
    group: aider
    mode: "0640"
    content: |
      # Generated by Ansible - do not edit manually
      # Aider environment configuration
      # Validates: Requirements 1.2, 1.3, 1.4, 1.6

      # API configuration (Requirement 1.2, 1.3)
      OPENAI_API_BASE={{ aider_api_base }}
      OPENAI_API_KEY={{ aider_api_key }}

      # Model settings (Requirement 1.4)
      AIDER_MODEL=openai/{{ aider_model_name }}
      AIDER_EDIT_FORMAT={{ aider_edit_format }}
      AIDER_MAP_TOKENS={{ aider_map_tokens }}
      AIDER_MAX_CHAT_HISTORY_TOKENS={{ aider_max_chat_history_tokens }}

      # Non-interactive mode (Requirement 1.6)
      AIDER_YES_ALWAYS=true
      AIDER_NO_AUTO_COMMITS=true
      AIDER_NO_SUGGEST_SHELL_COMMANDS=true
      AIDER_NO_SHOW_DIFFS=true
  when: aider_enabled

# ─── Aider Installation Verification ────────────────────────────────────────
# Validates: Requirement 1.5

- name: Verify Aider installation
  ansible.builtin.command:
    argv:
      - /srv/ai-lab/aider/.local/bin/aider
      - --version
  become: true
  become_user: aider
  environment:
    HOME: /srv/ai-lab/aider
  register: aider_version_check
  changed_when: false
  failed_when: aider_version_check.rc != 0
  when:
    - aider_enabled
    - not ansible_check_mode

- name: Display Aider version
  ansible.builtin.debug:
    msg: "Aider installed successfully: {{ aider_version_check.stdout }}"
  when:
    - aider_enabled
    - aider_version_check is not skipped

# ─── Environment File and Wrapper Scripts ─────────────────────────────────────
# Validates: Requirements 17.3, 17.4, 17.5

- name: Deploy aider environment file
  ansible.builtin.copy:
    dest: /etc/aider/environment
    owner: root
    group: aider
    mode: "0640"
    content: |
      # Generated by Ansible - do not edit manually
      AIDER_TASK_TIMEOUT={{ aider_task_timeout }}
      AIDER_TEST_TIMEOUT={{ aider_test_timeout }}
      AIDER_MAX_CONCURRENT={{ aider_max_concurrent }}
      AIDER_QUEUE_TIMEOUT={{ aider_queue_timeout }}
      AIDER_MAX_WORKSPACE_DISK={{ aider_max_workspace_disk }}
      AIDER_MAX_WORKSPACE_SIZE={{ aider_max_workspace_size }}
      AIDER_EDIT_FORMAT={{ aider_edit_format }}
      AIDER_MAP_TOKENS={{ aider_map_tokens }}
      AIDER_MAX_CHAT_HISTORY_TOKENS={{ aider_max_chat_history_tokens }}
      AIDER_MODEL_NAME={{ aider_model_name }}
      AIDER_DEFAULT_MODE={{ aider_default_mode }}
      AIDER_API_BASE={{ aider_api_base }}
      AIDER_API_KEY={{ aider_api_key }}
      AIDER_WORKSPACE_ROOT=/srv/ai-lab/aider/workspaces
      AIDER_REPOS_DIR=/srv/ai-lab/repos
      AIDER_LOG_DIR=/var/log/aider
      AIDER_LOCK_DIR=/run/aider
      AIDER_PROTECTED_BRANCHES={{ aider_protected_branches | join(',') }}
  when: aider_enabled

- name: Deploy aider-task wrapper script
  ansible.builtin.copy:
    src: aider-task
    dest: /usr/local/bin/aider-task
    owner: root
    group: root
    mode: "0755"
  when: aider_enabled

- name: Deploy aider-task-lib.sh library
  ansible.builtin.copy:
    src: aider-task-lib.sh
    dest: /usr/local/lib/aider-task-lib.sh
    owner: root
    group: root
    mode: "0644"
  when: aider_enabled

- name: Deploy aider-cleanup script
  ansible.builtin.copy:
    src: aider-cleanup
    dest: /usr/local/bin/aider-cleanup
    owner: root
    group: root
    mode: "0755"
  when: aider_enabled

# ─── Network Isolation (iptables) ────────────────────────────────────────────
# Validates: Requirements 15.1, 15.2, 15.3, 15.4, 15.5, 15.6

- name: Install iptables-persistent for rule persistence
  ansible.builtin.apt:
    name:
      - iptables
      - iptables-persistent
    state: present
  environment:
    DEBIAN_FRONTEND: noninteractive
  when: aider_enabled

- name: Deploy iptables rules for aider network isolation
  ansible.builtin.copy:
    dest: /etc/iptables/rules.v4
    owner: root
    group: root
    mode: "0644"
    content: |
      *filter
      :INPUT ACCEPT [0:0]
      :FORWARD ACCEPT [0:0]
      :OUTPUT ACCEPT [0:0]
      # Allow loopback traffic to inference endpoints (Requirement 15.1)
      -A OUTPUT -m owner --uid-owner aider -d 127.0.0.1 -p tcp --dport 8080:8084 -j ACCEPT
      # Allow DNS resolution via systemd-resolved (Requirement 15.1)
      -A OUTPUT -m owner --uid-owner aider -d 127.0.0.53 -p udp --dport 53 -j ACCEPT
      -A OUTPUT -m owner --uid-owner aider -d 127.0.0.53 -p tcp --dport 53 -j ACCEPT
      # Allow established/related return traffic (Requirement 15.1)
      -A OUTPUT -m owner --uid-owner aider -m state --state ESTABLISHED,RELATED -j ACCEPT
      # Block all other outbound for aider user (Requirement 15.2)
      -A OUTPUT -m owner --uid-owner aider -j DROP
      COMMIT
  when: aider_enabled
  notify: Reload iptables rules
  register: aider_iptables_rules

- name: Apply iptables rules immediately
  ansible.builtin.command:
    argv:
      - iptables-restore
      - /etc/iptables/rules.v4
  when:
    - aider_enabled
    - aider_iptables_rules.changed
    - not ansible_check_mode
  register: aider_iptables_apply
  failed_when: aider_iptables_apply.rc != 0

- name: Verify iptables rules are loaded
  ansible.builtin.command:
    argv:
      - iptables
      - -L
      - OUTPUT
      - -n
      - --line-numbers
  register: aider_iptables_verify
  changed_when: false
  failed_when: "'owner UID match' not in aider_iptables_verify.stdout"
  when:
    - aider_enabled
    - not ansible_check_mode

- name: Verify network isolation — test external connection as aider user
  ansible.builtin.command:
    argv:
      - bash
      - -c
      - "timeout 5 bash -c 'echo > /dev/tcp/8.8.8.8/53' 2>&1 && exit 1 || exit 0"
  become: true
  become_user: aider
  register: aider_net_isolation_test
  changed_when: false
  failed_when: aider_net_isolation_test.rc != 0
  when:
    - aider_enabled
    - not ansible_check_mode

- name: Fail if network isolation cannot be verified
  ansible.builtin.fail:
    msg: >-
      FATAL: Network isolation for aider user could not be verified.
      External connections should be blocked but the verification test did not confirm isolation.
      Refusing to continue without network isolation (Requirement 15.6).
  when:
    - aider_enabled
    - aider_net_isolation_test is defined
    - aider_net_isolation_test.rc is defined
    - aider_net_isolation_test.rc != 0
