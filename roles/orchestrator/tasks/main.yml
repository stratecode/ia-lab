- name: Configure orchestrator platform
  when: orchestrator_enabled
  block:
    - name: Assert required orchestrator secrets are configured
      ansible.builtin.assert:
        that:
          - orchestrator_postgres_password | length > 0
          - orchestrator_telegram_bot_token | length > 0
          - orchestrator_cleanup_api_key | length > 0
          - orchestrator_open_webui_api_key | length > 0
          - orchestrator_telegram_allowed_users | length > 0
        fail_msg: >-
          Missing required orchestrator configuration. Set LAB_POSTGRES_PASSWORD,
          LAB_TELEGRAM_BOT_TOKEN, LAB_TELEGRAM_ALLOWED_USERS,
          LAB_ORCHESTRATOR_CLEANUP_API_KEY and
          LAB_ORCHESTRATOR_OPEN_WEBUI_API_KEY before deploying.

    - name: Install orchestrator runtime packages
      ansible.builtin.apt:
        name:
          - python3
          - python3-venv
          - python3-pip
          - tesseract-ocr
        state: present

    - name: Ensure orchestrator group exists
      ansible.builtin.group:
        name: "{{ orchestrator_group }}"
        system: true

    - name: Ensure orchestrator user exists
      ansible.builtin.user:
        name: "{{ orchestrator_user }}"
        group: "{{ orchestrator_group }}"
        home: "{{ orchestrator_root_dir }}"
        shell: /usr/sbin/nologin
        system: true
        create_home: false

    - name: Ensure orchestrator directories exist
      ansible.builtin.file:
        path: "{{ item.path }}"
        state: directory
        owner: "{{ item.owner | default(orchestrator_user) }}"
        group: "{{ item.group | default(orchestrator_group) }}"
        mode: "{{ item.mode }}"
      loop:
        - { path: "{{ orchestrator_root_dir }}", mode: "0755" }
        - { path: "{{ orchestrator_runtime_dir }}", mode: "0755" }
        - { path: "{{ orchestrator_sidecar_root_dir }}", mode: "0755" }
        - { path: "{{ orchestrator_workspace_root }}", mode: "0755" }
        - { path: "{{ orchestrator_log_dir }}", mode: "0755" }
        - { path: "{{ orchestrator_config_dir }}", owner: "root", mode: "0750" }
        - { path: "{{ orchestrator_compose_dir }}", owner: "root", group: "root", mode: "0755" }
        - { path: "{{ orchestrator_postgres_data_dir }}", owner: "root", group: "root", mode: "0755" }
        - { path: "{{ orchestrator_postgres_backup_dir }}", owner: "root", group: "root", mode: "0755" }
        - { path: "/var/snap/prometheus/common/file_sd", owner: "root", group: "root", mode: "0755" }
        - { path: "/var/lib/prometheus/node-exporter", owner: "root", group: "root", mode: "0755" }

    - name: Install sidecar requirements manifest
      ansible.builtin.copy:
        src: "{{ inventory_dir }}/requirements-sidecars.txt"
        dest: "{{ orchestrator_sidecar_root_dir }}/requirements-sidecars.txt"
        owner: "{{ orchestrator_user }}"
        group: "{{ orchestrator_group }}"
        mode: "0644"
      notify:
        - Restart orchestrator docs sidecar service
        - Restart orchestrator images sidecar service

    - name: Install capability sidecar source tree
      ansible.builtin.copy:
        src: "{{ inventory_dir }}/src/cap_sidecars"
        dest: "{{ orchestrator_sidecar_root_dir }}/"
        owner: "{{ orchestrator_user }}"
        group: "{{ orchestrator_group }}"
        mode: "0644"
        directory_mode: "0755"
      notify:
        - Restart orchestrator docs sidecar service
        - Restart orchestrator images sidecar service

    - name: Remove stale deployment artifacts from sidecar source tree
      ansible.builtin.shell: |
        set -euo pipefail
        find "{{ orchestrator_sidecar_root_dir }}/cap_sidecars" \
          \( -name '__pycache__' -o -name '.DS_Store' -o -name '._*' -o -name '*.pyc' \) \
          -print0 | xargs -0r rm -rf
      args:
        executable: /bin/bash
      changed_when: false
      notify:
        - Restart orchestrator docs sidecar service
        - Restart orchestrator images sidecar service

    - name: Remove retired Python API source tree
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - "{{ orchestrator_root_dir }}/src"
        - "{{ orchestrator_root_dir }}/venv"
        - "{{ orchestrator_root_dir }}/go-shadow"

    - name: Install PostgreSQL compose file for orchestrator
      ansible.builtin.copy:
        dest: "{{ orchestrator_compose_dir }}/docker-compose.yml"
        mode: "0644"
        content: |
          services:
            postgres:
              image: pgvector/pgvector:pg16
              container_name: orchestrator-postgres
              restart: unless-stopped
              ports:
                - "127.0.0.1:{{ orchestrator_postgres_port }}:5432"
              environment:
                POSTGRES_DB: "{{ orchestrator_postgres_db }}"
                POSTGRES_USER: "{{ orchestrator_postgres_user }}"
                POSTGRES_PASSWORD: "{{ orchestrator_postgres_password }}"
              volumes:
                - "{{ orchestrator_postgres_data_dir }}:/var/lib/postgresql/data"
              healthcheck:
                test: ["CMD-SHELL", "pg_isready -U {{ orchestrator_postgres_user }} -d {{ orchestrator_postgres_db }}"]
                interval: 10s
                timeout: 5s
                retries: 5
                start_period: 30s
              shm_size: 128mb
      notify: Restart orchestrator postgres stack

    - name: Start orchestrator PostgreSQL stack
      ansible.builtin.command: docker compose up -d
      args:
        chdir: "{{ orchestrator_compose_dir }}"
      changed_when: false

    - name: Wait for PostgreSQL to accept connections
      ansible.builtin.command:
        argv:
          - docker
          - exec
          - orchestrator-postgres
          - pg_isready
          - -U
          - "{{ orchestrator_postgres_user }}"
          - -d
          - "{{ orchestrator_postgres_db }}"
      register: orchestrator_pg_isready
      changed_when: false
      retries: 20
      delay: 3
      until: orchestrator_pg_isready.rc == 0

    - name: Apply orchestrator task schema compatibility patch
      ansible.builtin.command:
        argv:
          - docker
          - exec
          - -i
          - orchestrator-postgres
          - psql
          - -U
          - "{{ orchestrator_postgres_user }}"
          - -d
          - "{{ orchestrator_postgres_db }}"
          - -v
          - ON_ERROR_STOP=1
          - -c
          - |
            CREATE EXTENSION IF NOT EXISTS vector;

            ALTER TABLE tasks
              ADD COLUMN IF NOT EXISTS archived_at TIMESTAMPTZ NULL;
            ALTER TABLE tasks
              ADD COLUMN IF NOT EXISTS initiative_id UUID NULL;
            ALTER TABLE tasks
              ADD COLUMN IF NOT EXISTS planned_agent agenttype NULL;
            CREATE INDEX IF NOT EXISTS ix_tasks_archived_at ON tasks (archived_at);
            CREATE INDEX IF NOT EXISTS ix_tasks_initiative_id ON tasks (initiative_id);

            CREATE TABLE IF NOT EXISTS initiatives (
              id UUID PRIMARY KEY,
              title TEXT NOT NULL,
              workspace_root TEXT NOT NULL,
              goal TEXT NOT NULL,
              status TEXT NOT NULL,
              current_phase TEXT NOT NULL,
              active_requirements_artifact_id UUID NULL,
              active_design_artifact_id UUID NULL,
              active_plan_artifact_id UUID NULL,
              created_by TEXT NOT NULL,
              execution_mode TEXT NOT NULL,
              archived_at TIMESTAMPTZ NULL,
              created_at TIMESTAMPTZ NOT NULL DEFAULT NOW(),
              updated_at TIMESTAMPTZ NOT NULL DEFAULT NOW()
            );
            CREATE INDEX IF NOT EXISTS ix_initiatives_workspace_root ON initiatives (workspace_root);
            CREATE INDEX IF NOT EXISTS ix_initiatives_status_phase ON initiatives (status, current_phase);

            CREATE TABLE IF NOT EXISTS initiative_phase_reviews (
              id UUID PRIMARY KEY,
              initiative_id UUID NOT NULL REFERENCES initiatives(id) ON DELETE CASCADE,
              phase TEXT NOT NULL,
              decision TEXT NOT NULL,
              feedback TEXT NULL,
              generated_by TEXT NULL,
              artifact_markdown_id UUID NULL,
              artifact_json_id UUID NULL,
              created_at TIMESTAMPTZ NOT NULL DEFAULT NOW()
            );
            CREATE INDEX IF NOT EXISTS ix_initiative_phase_reviews_initiative_phase ON initiative_phase_reviews (initiative_id, phase, created_at DESC);

            CREATE TABLE IF NOT EXISTS initiative_task_links (
              id UUID PRIMARY KEY,
              initiative_id UUID NOT NULL REFERENCES initiatives(id) ON DELETE CASCADE,
              task_id UUID NOT NULL REFERENCES tasks(id) ON DELETE CASCADE,
              phase_origin TEXT NOT NULL,
              epic TEXT NULL,
              launch_group TEXT NULL,
              execution_mode TEXT NOT NULL,
              launch_order INTEGER NOT NULL DEFAULT 10,
              created_at TIMESTAMPTZ NOT NULL DEFAULT NOW(),
              UNIQUE (initiative_id, task_id)
            );
            CREATE INDEX IF NOT EXISTS ix_initiative_task_links_initiative_launch_order ON initiative_task_links (initiative_id, launch_order);

            DO $$
            DECLARE
              current_dims INTEGER;
            BEGIN
              SELECT atttypmod INTO current_dims
              FROM pg_attribute
              WHERE attrelid = 'semantic_chunks'::regclass
                AND attname = 'embedding'
                AND NOT attisdropped;
              IF current_dims IS NOT NULL AND current_dims <> {{ orchestrator_semantic_embedding_dimensions }} THEN
                DROP TABLE semantic_chunks;
              END IF;
            EXCEPTION
              WHEN undefined_table THEN
                NULL;
            END $$;

            CREATE TABLE IF NOT EXISTS semantic_chunks (
              id UUID PRIMARY KEY,
              source_type TEXT NOT NULL,
              source_id UUID NOT NULL,
              initiative_id UUID NULL,
              task_id UUID NULL,
              artifact_id UUID NULL,
              workspace_root TEXT NULL,
              chunk_index INTEGER NOT NULL,
              content_text TEXT NOT NULL,
              content_hash TEXT NOT NULL,
              metadata JSONB NOT NULL DEFAULT '{}'::jsonb,
              embedding vector({{ orchestrator_semantic_embedding_dimensions }}) NOT NULL,
              created_at TIMESTAMPTZ NOT NULL DEFAULT NOW(),
              updated_at TIMESTAMPTZ NOT NULL DEFAULT NOW(),
              UNIQUE (source_type, source_id, chunk_index, content_hash)
            );
            CREATE INDEX IF NOT EXISTS ix_semantic_chunks_source ON semantic_chunks (source_type, source_id);
            CREATE INDEX IF NOT EXISTS ix_semantic_chunks_initiative_id ON semantic_chunks (initiative_id);
            CREATE INDEX IF NOT EXISTS ix_semantic_chunks_task_id ON semantic_chunks (task_id);
            CREATE INDEX IF NOT EXISTS ix_semantic_chunks_artifact_id ON semantic_chunks (artifact_id);
            CREATE INDEX IF NOT EXISTS ix_semantic_chunks_workspace_root ON semantic_chunks (workspace_root);
            CREATE INDEX IF NOT EXISTS ix_semantic_chunks_metadata ON semantic_chunks USING GIN (metadata);
            CREATE INDEX IF NOT EXISTS ix_semantic_chunks_embedding_cosine
              ON semantic_chunks USING ivfflat (embedding vector_cosine_ops)
              WITH (lists = 100);
      register: orchestrator_schema_patch
      changed_when: false

    - name: Install orchestrator environment file
      ansible.builtin.copy:
        dest: "{{ orchestrator_config_dir }}/orchestrator.env"
        owner: root
        group: "{{ orchestrator_group }}"
        mode: "0640"
        content: |
          # Generated by Ansible - do not edit manually
          LAB_ORCHESTRATOR_MODE={{ orchestrator_mode }}
          LAB_ORCHESTRATOR_HOST={{ orchestrator_go_host }}
          LAB_ORCHESTRATOR_PORT={{ orchestrator_go_port }}
          LAB_ORCHESTRATOR_SAFE_MODE={{ 'true' if orchestrator_safe_mode else 'false' }}
          LAB_ORCHESTRATOR_LOG_LEVEL={{ orchestrator_log_level }}
          LAB_ORCHESTRATOR_WORKSPACE_RETENTION_HOURS={{ orchestrator_workspace_retention_hours }}
          LAB_LOG_LEVEL={{ orchestrator_log_level }}
          LAB_POSTGRES_HOST={{ orchestrator_postgres_host }}
          LAB_POSTGRES_PORT={{ orchestrator_postgres_port }}
          LAB_POSTGRES_DB={{ orchestrator_postgres_db }}
          LAB_POSTGRES_USER={{ orchestrator_postgres_user }}
          LAB_POSTGRES_PASSWORD={{ orchestrator_postgres_password }}
          LAB_REDIS_URL={{ orchestrator_redis_url }}
          LAB_TELEGRAM_BOT_TOKEN={{ orchestrator_telegram_bot_token }}
          LAB_TELEGRAM_ALLOWED_USERS={{ orchestrator_telegram_allowed_users }}
          LAB_WORKER_HEARTBEAT_INTERVAL={{ orchestrator_worker_heartbeat_interval }}
          LAB_SCHEDULER_MAX_CONCURRENT_TASKS={{ orchestrator_scheduler_max_concurrent_tasks }}
          LAB_MAX_CONCURRENT_TASKS={{ orchestrator_scheduler_max_concurrent_tasks }}
          LAB_QUEUE_MAX_GLOBAL={{ orchestrator_queue_max_global }}
          LAB_QUEUE_MAX_PER_AGENT={{ orchestrator_queue_max_per_agent }}
          LAB_RATE_LIMIT_PER_KEY={{ orchestrator_rate_limit_per_key }}
          LAB_WORKSPACE_ROOT={{ orchestrator_workspace_root }}
          LAB_WORKSPACE_RETENTION_HOURS={{ orchestrator_workspace_retention_hours }}
          LAB_TELEGRAM_BOT_TOKEN={{ orchestrator_telegram_bot_token }}
          LAB_TELEGRAM_ALLOWED_USERS={{ orchestrator_telegram_allowed_users }}
          LAB_LLAMA_CODE_BASE_URL=http://127.0.0.1:{{ (llama_cpp_instances | selectattr('alias', 'equalto', 'coder') | map(attribute='port') | first) }}/v1
          LAB_LLAMA_CODE_API_KEY={{ llama_cpp_instances | selectattr('alias', 'equalto', 'coder') | map(attribute='api_key') | first }}
          LAB_LLAMA_PLANNER_BASE_URL=http://127.0.0.1:{{ (llama_cpp_instances | selectattr('alias', 'equalto', 'planner') | map(attribute='port') | first) }}/v1
          LAB_LLAMA_PLANNER_API_KEY={{ llama_cpp_instances | selectattr('alias', 'equalto', 'planner') | map(attribute='api_key') | first }}
          LAB_LLAMA_UTILITY_BASE_URL=http://127.0.0.1:{{ (llama_cpp_instances | selectattr('alias', 'equalto', 'utility') | map(attribute='port') | first) }}/v1
          LAB_LLAMA_UTILITY_API_KEY={{ llama_cpp_instances | selectattr('alias', 'equalto', 'utility') | map(attribute='api_key') | first }}
          LAB_SEMANTIC_ENABLED={{ 'true' if orchestrator_semantic_enabled else 'false' }}
          LAB_SEMANTIC_EMBEDDING_BASE_URL=http://127.0.0.1:{{ (llama_cpp_instances | selectattr('alias', 'equalto', 'embeddings') | map(attribute='port') | first) }}/v1
          LAB_SEMANTIC_EMBEDDING_API_KEY={{ llama_cpp_instances | selectattr('alias', 'equalto', 'embeddings') | map(attribute='api_key') | first }}
          LAB_SEMANTIC_EMBEDDING_MODEL={{ orchestrator_semantic_embedding_model }}
          LAB_SEMANTIC_EMBEDDING_DIMENSIONS={{ orchestrator_semantic_embedding_dimensions }}
          LAB_SEMANTIC_CHUNK_MAX_CHARS={{ orchestrator_semantic_chunk_max_chars }}
          LAB_SEMANTIC_CHUNK_OVERLAP_CHARS={{ orchestrator_semantic_chunk_overlap_chars }}
          LAB_SEMANTIC_MAX_CHUNKS_PER_SOURCE={{ orchestrator_semantic_max_chunks_per_source }}
          LAB_SEMANTIC_CONTEXT_MAX_CHUNKS={{ orchestrator_semantic_context_max_chunks }}
          LAB_SEMANTIC_CONTEXT_MAX_CHARS={{ orchestrator_semantic_context_max_chars }}
          LAB_CAPABILITIES_ALLOWED_LOCAL_ROOTS={{ orchestrator_capabilities_allowed_local_roots }}
          LAB_CAPABILITIES_ALLOWED_URL_SCHEMES={{ orchestrator_capabilities_allowed_url_schemes }}
          LAB_CAPABILITIES_MAX_HTML_BYTES={{ orchestrator_capabilities_max_html_bytes }}
          LAB_CAPABILITIES_MAX_DOCUMENT_BYTES={{ orchestrator_capabilities_max_document_bytes }}
          LAB_CAPABILITIES_MAX_IMAGE_BYTES={{ orchestrator_capabilities_max_image_bytes }}
          LAB_CAPABILITIES_MAX_ARTIFACT_TEXT_CHARS={{ orchestrator_capabilities_max_artifact_text_chars }}
          LAB_CAPABILITIES_DOCS_SIDECAR_URL={{ orchestrator_docs_sidecar_url }}
          LAB_CAPABILITIES_IMAGES_SIDECAR_URL={{ orchestrator_images_sidecar_url }}
          LAB_CAPABILITIES_PLANNER_ALLOWED={{ orchestrator_planner_allowed_capabilities }}
          LAB_CAPABILITIES_CODER_ALLOWED={{ orchestrator_coder_allowed_capabilities }}
          LAB_OPENAI_BASE_URL={{ orchestrator_openai_base_url }}
          LAB_OPENAI_REFERENCE_API_KEY={{ orchestrator_openai_reference_api_key }}
          LAB_OPENAI_REFERENCE_MODEL={{ orchestrator_openai_reference_model }}
          LAB_OPENAI_JUDGE_MODEL={{ orchestrator_openai_judge_model }}
          LAB_OPENAI_TIMEOUT_SECONDS={{ orchestrator_openai_timeout_seconds }}
          LAB_AIDER_TASK_PATH={{ orchestrator_aider_task_path }}
          LAB_AIDER_TIMEOUT_SECONDS={{ orchestrator_aider_timeout_seconds }}
          LAB_AIDER_DEFAULT_BRANCH={{ orchestrator_aider_default_branch }}
      notify: Restart orchestrator service

    - name: Install orchestrator cleanup environment file
      ansible.builtin.copy:
        dest: "{{ orchestrator_config_dir }}/cleanup.env"
        owner: root
        group: root
        mode: "0600"
        content: |
          LAB_ORCHESTRATOR_CLEANUP_API_KEY={{ orchestrator_cleanup_api_key }}
      notify: Restart orchestrator cleanup timer

    - name: Install orchestrator-go main runtime binary
      ansible.builtin.copy:
        src: "{{ orchestrator_go_binary_path }}"
        dest: "{{ orchestrator_runtime_dir }}/orchestrator-go"
        owner: "{{ orchestrator_user }}"
        group: "{{ orchestrator_group }}"
        mode: "0755"
      notify: Restart orchestrator service

    - name: Install sidecar dependencies in dedicated virtualenv
      ansible.builtin.pip:
        requirements: "{{ orchestrator_sidecar_root_dir }}/requirements-sidecars.txt"
        virtualenv: "{{ orchestrator_sidecar_venv_dir }}"
        virtualenv_command: /usr/bin/python3 -m venv
      notify:
        - Restart orchestrator docs sidecar service
        - Restart orchestrator images sidecar service

    - name: Install capability docs sidecar service unit
      ansible.builtin.copy:
        dest: /etc/systemd/system/orchestrator-cap-docs.service
        owner: root
        group: root
        mode: "0644"
        content: |
          [Unit]
          Description=Orchestrator capability docs sidecar
          After=network-online.target
          Wants=network-online.target

          [Service]
          Type=simple
          User={{ orchestrator_user }}
          Group={{ orchestrator_group }}
          WorkingDirectory={{ orchestrator_sidecar_root_dir }}
          ExecStart={{ orchestrator_sidecar_venv_dir }}/bin/uvicorn cap_sidecars.docs_server:app --app-dir {{ orchestrator_sidecar_root_dir }} --host {{ orchestrator_docs_sidecar_host }} --port {{ orchestrator_docs_sidecar_port }}
          Restart=always
          RestartSec=5
          NoNewPrivileges=true
          PrivateTmp=true
          ProtectSystem=strict
          ProtectHome=true
          ReadWritePaths={{ orchestrator_sidecar_root_dir }} {{ orchestrator_log_dir }}

          [Install]
          WantedBy=multi-user.target
      notify: Restart orchestrator docs sidecar service

    - name: Install capability images sidecar service unit
      ansible.builtin.copy:
        dest: /etc/systemd/system/orchestrator-cap-images.service
        owner: root
        group: root
        mode: "0644"
        content: |
          [Unit]
          Description=Orchestrator capability images sidecar
          After=network-online.target
          Wants=network-online.target

          [Service]
          Type=simple
          User={{ orchestrator_user }}
          Group={{ orchestrator_group }}
          WorkingDirectory={{ orchestrator_sidecar_root_dir }}
          ExecStart={{ orchestrator_sidecar_venv_dir }}/bin/uvicorn cap_sidecars.images_server:app --app-dir {{ orchestrator_sidecar_root_dir }} --host {{ orchestrator_images_sidecar_host }} --port {{ orchestrator_images_sidecar_port }}
          Restart=always
          RestartSec=5
          NoNewPrivileges=true
          PrivateTmp=true
          ProtectSystem=strict
          ProtectHome=true
          ReadWritePaths={{ orchestrator_sidecar_root_dir }} {{ orchestrator_log_dir }}

          [Install]
          WantedBy=multi-user.target
      notify: Restart orchestrator images sidecar service

    - name: Install orchestrator PostgreSQL backup script
      ansible.builtin.copy:
        dest: /usr/local/bin/orchestrator-pg-backup.sh
        owner: root
        group: root
        mode: "0755"
        content: |
          #!/usr/bin/env bash
          set -euo pipefail

          BACKUP_DIR="{{ orchestrator_postgres_backup_dir }}"
          RETAIN_COUNT="{{ orchestrator_backup_retain_count }}"
          TIMESTAMP="$(date -u +%Y%m%dT%H%M%SZ)"
          BACKUP_FILE="${BACKUP_DIR}/orchestrator_${TIMESTAMP}.dump"
          CONTAINER_NAME="orchestrator-postgres"
          TEXTFILE_DIR="/var/lib/prometheus/node-exporter"

          docker exec "${CONTAINER_NAME}" pg_dump \
            -U "${POSTGRES_USER:-{{ orchestrator_postgres_user }}}" \
            -d "${POSTGRES_DB:-{{ orchestrator_postgres_db }}}" \
            -Fc --no-owner --no-acl \
            > "${BACKUP_FILE}"

          if docker exec -i "${CONTAINER_NAME}" pg_restore --list < "${BACKUP_FILE}" > /dev/null 2>&1; then
            echo "Backup validation passed: ${BACKUP_FILE}"
            cat > "${TEXTFILE_DIR}/pg_backup_status.prom" <<EOF
          # HELP orchestrator_pg_backup_validation_failed PostgreSQL backup validation failure (1=failed, 0=ok)
          # TYPE orchestrator_pg_backup_validation_failed gauge
          orchestrator_pg_backup_validation_failed{job="orchestrator"} 0
          # HELP orchestrator_pg_backup_last_success_timestamp_seconds Unix timestamp of last successful backup
          # TYPE orchestrator_pg_backup_last_success_timestamp_seconds gauge
          orchestrator_pg_backup_last_success_timestamp_seconds{job="orchestrator"} $(date +%s)
          EOF
          else
            echo "ERROR: Backup validation FAILED for ${BACKUP_FILE}" >&2
            cat > "${TEXTFILE_DIR}/pg_backup_status.prom" <<EOF
          # HELP orchestrator_pg_backup_validation_failed PostgreSQL backup validation failure (1=failed, 0=ok)
          # TYPE orchestrator_pg_backup_validation_failed gauge
          orchestrator_pg_backup_validation_failed{job="orchestrator"} 1
          EOF
            exit 1
          fi

          cd "${BACKUP_DIR}"
          ls -1t orchestrator_*.dump 2>/dev/null | tail -n +$((RETAIN_COUNT + 1)) | xargs -r rm -f
          echo "Backup completed successfully: ${BACKUP_FILE}"

    - name: Install orchestrator PostgreSQL backup service unit
      ansible.builtin.copy:
        dest: /etc/systemd/system/orchestrator-pg-backup.service
        mode: "0644"
        content: |
          [Unit]
          Description=PostgreSQL backup for Orchestrator database
          Wants=docker.service
          After=docker.service

          [Service]
          Type=oneshot
          ExecStart=/usr/local/bin/orchestrator-pg-backup.sh
          Environment=POSTGRES_USER={{ orchestrator_postgres_user }}
          Environment=POSTGRES_DB={{ orchestrator_postgres_db }}
      notify:
        - Reload systemd for orchestrator
        - Restart orchestrator backup timer

    - name: Install orchestrator PostgreSQL backup timer unit
      ansible.builtin.copy:
        dest: /etc/systemd/system/orchestrator-pg-backup.timer
        mode: "0644"
        content: |
          [Unit]
          Description=Daily PostgreSQL backup for Orchestrator database

          [Timer]
          OnCalendar=*-*-* 03:00:00 UTC
          Persistent=true
          Unit=orchestrator-pg-backup.service

          [Install]
          WantedBy=timers.target
      notify:
        - Reload systemd for orchestrator
        - Restart orchestrator backup timer

    - name: Install orchestrator workspace cleanup service unit
      ansible.builtin.copy:
        dest: /etc/systemd/system/orchestrator-workspace-cleanup.service
        mode: "0644"
        content: |
          [Unit]
          Description=Orchestrator workspace cleanup (remove expired workspaces)
          After=network-online.target orchestrator.service
          Wants=orchestrator.service

          [Service]
          Type=oneshot
          EnvironmentFile={{ orchestrator_config_dir }}/cleanup.env
          ExecStart=/usr/bin/curl -sf -X POST -H "Authorization: Bearer ${LAB_ORCHESTRATOR_CLEANUP_API_KEY}" http://127.0.0.1:{{ orchestrator_go_port }}/workspaces/cleanup
      notify:
        - Reload systemd for orchestrator
        - Restart orchestrator cleanup timer

    - name: Install orchestrator workspace cleanup timer unit
      ansible.builtin.copy:
        dest: /etc/systemd/system/orchestrator-workspace-cleanup.timer
        mode: "0644"
        content: |
          [Unit]
          Description=Hourly workspace cleanup for Orchestrator platform

          [Timer]
          OnCalendar=hourly
          Persistent=true
          RandomizedDelaySec=120
          Unit=orchestrator-workspace-cleanup.service

          [Install]
          WantedBy=timers.target
      notify:
        - Reload systemd for orchestrator
        - Restart orchestrator cleanup timer

    - name: Install orchestrator service unit
      ansible.builtin.copy:
        dest: /etc/systemd/system/orchestrator.service
        mode: "0644"
        content: |
          [Unit]
          Description=Orchestrator Platform Service
          Documentation=https://github.com/StrateCode/lab
          After=network-online.target redis-server.service docker.service
          Wants=network-online.target
          Requires=redis-server.service
          StartLimitIntervalSec=60
          StartLimitBurst=5

          [Service]
          Type=exec
          User={{ orchestrator_user }}
          Group={{ orchestrator_group }}
          WorkingDirectory={{ orchestrator_runtime_dir }}
          EnvironmentFile={{ orchestrator_config_dir }}/orchestrator.env
          ExecStart={{ orchestrator_runtime_dir }}/orchestrator-go
          Restart=on-failure
          RestartSec=5
          NoNewPrivileges=true
          ProtectSystem=strict
          ProtectHome=true
          PrivateTmp=true
          ReadWritePaths={{ orchestrator_root_dir }} {{ orchestrator_log_dir }}
          MemoryMax=2G
          TasksMax=256
          StandardOutput=journal
          StandardError=journal
          SyslogIdentifier=orchestrator

          [Install]
          WantedBy=multi-user.target
      notify:
        - Reload systemd for orchestrator
        - Restart orchestrator service

    - name: Install Prometheus scrape target for orchestrator
      ansible.builtin.copy:
        dest: /var/snap/prometheus/common/file_sd/orchestrator-targets.yml
        mode: "0644"
        content: |
          - targets:
              - "127.0.0.1:{{ orchestrator_port }}"
            labels:
              service: orchestrator
      notify: Restart prometheus

    - name: Flush orchestrator handlers before health checks
      ansible.builtin.meta: flush_handlers

    - name: Wait for capability docs sidecar
      ansible.builtin.uri:
        url: "http://{{ orchestrator_docs_sidecar_host }}:{{ orchestrator_docs_sidecar_port }}/docs"
        status_code: 200
      register: orchestrator_docs_sidecar_health
      retries: 20
      delay: 3
      until: orchestrator_docs_sidecar_health.status == 200

    - name: Wait for capability images sidecar
      ansible.builtin.uri:
        url: "http://{{ orchestrator_images_sidecar_host }}:{{ orchestrator_images_sidecar_port }}/docs"
        status_code: 200
      register: orchestrator_images_sidecar_health
      retries: 20
      delay: 3
      until: orchestrator_images_sidecar_health.status == 200

    - name: Wait for orchestrator health endpoint
      ansible.builtin.uri:
        url: "http://127.0.0.1:{{ orchestrator_go_port }}/health"
        status_code: 200
      register: orchestrator_health
      retries: 20
      delay: 3
      until: orchestrator_health.status == 200

    - name: Ensure cleanup API key exists in orchestrator database
      when: orchestrator_cleanup_api_key | length > 0
      ansible.builtin.shell: |
        set -euo pipefail
        export RAW_KEY="{{ orchestrator_cleanup_api_key }}"
        KEY_HASH="$(python3 - <<'PY'
        import hashlib
        import os
        print(hashlib.sha256(os.environ["RAW_KEY"].encode()).hexdigest())
        PY
        )"
        KEY_ID="$(python3 - <<'PY'
        import uuid
        print(uuid.uuid4())
        PY
        )"
        docker exec -i orchestrator-postgres psql -v ON_ERROR_STOP=1 -U "{{ orchestrator_postgres_user }}" -d "{{ orchestrator_postgres_db }}" <<SQL
        INSERT INTO api_keys (id, key_hash, name, scope, is_active, created_at)
        SELECT '${KEY_ID}'::uuid, '${KEY_HASH}', '{{ orchestrator_cleanup_key_name }}', 'operator', true, NOW()
        WHERE NOT EXISTS (
          SELECT 1 FROM api_keys WHERE name = '{{ orchestrator_cleanup_key_name }}'
        );
        UPDATE api_keys
           SET key_hash='${KEY_HASH}',
               scope='operator',
               is_active=true,
               revoked_at=NULL
         WHERE name='{{ orchestrator_cleanup_key_name }}'
           AND (
             key_hash <> '${KEY_HASH}'
             OR scope <> 'operator'
             OR is_active <> true
             OR revoked_at IS NOT NULL
           );
        SQL
      args:
        executable: /bin/bash
      changed_when: false

