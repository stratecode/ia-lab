- name: Reload systemd for orchestrator
  ansible.builtin.systemd:
    daemon_reload: true
  when: not ansible_check_mode

- name: Restart orchestrator postgres stack
  ansible.builtin.command: docker compose up -d
  args:
    chdir: "{{ orchestrator_compose_dir }}"
  when: not ansible_check_mode

- name: Restart orchestrator service
  ansible.builtin.systemd:
    name: orchestrator.service
    state: restarted
    daemon_reload: true
  when: not ansible_check_mode

- name: Restart orchestrator docs sidecar service
  ansible.builtin.systemd:
    name: orchestrator-cap-docs.service
    state: restarted
    daemon_reload: true
  when: not ansible_check_mode

- name: Restart orchestrator images sidecar service
  ansible.builtin.systemd:
    name: orchestrator-cap-images.service
    state: restarted
    daemon_reload: true
  when: not ansible_check_mode

- name: Restart orchestrator backup timer
  ansible.builtin.systemd:
    name: orchestrator-pg-backup.timer
    state: restarted
    enabled: true
    daemon_reload: true
  when: not ansible_check_mode

- name: Restart orchestrator cleanup timer
  ansible.builtin.systemd:
    name: orchestrator-workspace-cleanup.timer
    state: restarted
    enabled: true
    daemon_reload: true
  when: not ansible_check_mode

- name: Restart prometheus
  ansible.builtin.systemd:
    name: snap.prometheus.prometheus.service
    state: restarted
  when: not ansible_check_mode
