- name: Gather service facts for Route53 DDNS
  ansible.builtin.service_facts:

- name: Check whether Route53 DDNS timer unit exists
  ansible.builtin.stat:
    path: /etc/systemd/system/route53-ddns.timer
  register: route53_ddns_timer_unit

- name: Disable Route53 DDNS timer when feature is off
  ansible.builtin.systemd:
    name: route53-ddns.timer
    state: stopped
    enabled: false
  when:
    - not route53_ddns_enabled
    - route53_ddns_timer_unit.stat.exists

- name: Install Route53 DDNS dependencies
  ansible.builtin.apt:
    name:
      - awscli
      - curl
    state: present
  when: route53_ddns_enabled

- name: Ensure root AWS config directory exists
  ansible.builtin.file:
    path: /root/.aws
    state: directory
    owner: root
    group: root
    mode: "0700"
  when: route53_ddns_enabled

- name: Install AWS shared credentials file
  ansible.builtin.copy:
    dest: /root/.aws/credentials
    owner: root
    group: root
    mode: "0600"
    content: |
      {% for profile_name, profile in aws_cli_profiles.items() %}
      [{{ profile_name }}]
      aws_access_key_id={{ profile.aws_access_key_id | default('') }}
      aws_secret_access_key={{ profile.aws_secret_access_key | default('') }}
      {% if (profile.aws_session_token | default('')) | length > 0 %}
      aws_session_token={{ profile.aws_session_token }}
      {% endif %}

      {% endfor %}
  when: route53_ddns_enabled

- name: Install AWS shared config file
  ansible.builtin.copy:
    dest: /root/.aws/config
    owner: root
    group: root
    mode: "0600"
    content: |
      {% for profile_name, profile in aws_cli_profiles.items() %}
      [profile {{ profile_name }}]
      region={{ profile.region | default('us-east-1') }}
      output=json

      {% endfor %}
  when: route53_ddns_enabled

- name: Install Route53 DDNS updater script
  ansible.builtin.copy:
    dest: /usr/local/bin/route53-ddns.sh
    mode: "0750"
    content: |
      #!/usr/bin/env bash
      set -euo pipefail

      exec 9>/run/route53-ddns.lock
      flock -n 9 || exit 0

      : "${ROUTE53_RECORD_NAME:?ROUTE53_RECORD_NAME is required}"

      RECORD_NAME="${ROUTE53_RECORD_NAME%.}"
      ZONE_NAME="${ROUTE53_ZONE_NAME:-}"
      HOSTED_ZONE_ID="${ROUTE53_HOSTED_ZONE_ID:-}"
      TTL="${ROUTE53_TTL:-300}"

      get_public_ip() {
        local candidate
        for endpoint in \
          "https://checkip.amazonaws.com" \
          "https://api.ipify.org" \
          "https://ifconfig.me/ip"
        do
          if candidate="$(curl -fsSL --max-time 10 "${endpoint}" 2>/dev/null | tr -d '[:space:]')" \
            && [[ "${candidate}" =~ ^([0-9]{1,3}\.){3}[0-9]{1,3}$ ]]; then
            echo "${candidate}"
            return 0
          fi
        done

        return 1
      }

      resolve_hosted_zone_id() {
        local requested_zone="${1%.}."
        local resolved_name resolved_id

        read -r resolved_name resolved_id < <(
          aws route53 list-hosted-zones-by-name \
            --dns-name "${requested_zone}" \
            --max-items 1 \
            --query 'HostedZones[0].[Name,Id]' \
            --output text
        )

        if [[ "${resolved_name}" != "${requested_zone}" || -z "${resolved_id}" || "${resolved_id}" == "None" ]]; then
          echo "Unable to resolve hosted zone ID for ${requested_zone}" >&2
          return 1
        fi

        echo "${resolved_id#/hostedzone/}"
      }

      PUBLIC_IP="$(get_public_ip)"
      if [[ -z "${PUBLIC_IP}" ]]; then
        echo "Unable to determine public IPv4 address" >&2
        exit 1
      fi

      if [[ -z "${HOSTED_ZONE_ID}" ]]; then
        : "${ZONE_NAME:?ROUTE53_ZONE_NAME is required when ROUTE53_HOSTED_ZONE_ID is unset}"
        HOSTED_ZONE_ID="$(resolve_hosted_zone_id "${ZONE_NAME}")"
      fi

      RECORD_FQDN="${RECORD_NAME}."
      read -r CURRENT_NAME CURRENT_TYPE CURRENT_VALUE < <(
        aws route53 list-resource-record-sets \
          --hosted-zone-id "${HOSTED_ZONE_ID}" \
          --start-record-name "${RECORD_FQDN}" \
          --start-record-type A \
          --max-items 1 \
          --query 'ResourceRecordSets[0].[Name,Type,ResourceRecords[0].Value]' \
          --output text
      )

      if [[ "${CURRENT_NAME:-}" == "${RECORD_FQDN}" && "${CURRENT_TYPE:-}" == "A" && "${CURRENT_VALUE:-}" == "${PUBLIC_IP}" ]]; then
        echo "Route53 DDNS unchanged: ${RECORD_NAME} already points to ${PUBLIC_IP}"
        exit 0
      fi

      TMP_BATCH="$(mktemp)"
      trap 'rm -f "${TMP_BATCH}"' EXIT

      cat > "${TMP_BATCH}" <<EOF
      {
        "Comment": "Automatic DDNS update for ${RECORD_NAME}",
        "Changes": [
          {
            "Action": "UPSERT",
            "ResourceRecordSet": {
              "Name": "${RECORD_FQDN}",
              "Type": "A",
              "TTL": ${TTL},
              "ResourceRecords": [
                { "Value": "${PUBLIC_IP}" }
              ]
            }
          }
        ]
      }
      EOF

      aws route53 change-resource-record-sets \
        --hosted-zone-id "${HOSTED_ZONE_ID}" \
        --change-batch "file://${TMP_BATCH}" \
        >/dev/null

      echo "Route53 DDNS updated: ${RECORD_NAME} -> ${PUBLIC_IP}"
  when: route53_ddns_enabled

- name: Install Route53 DDNS environment file
  ansible.builtin.copy:
    dest: /etc/route53-ddns.env
    mode: "0600"
    content: |
      AWS_PROFILE={{ route53_ddns_aws_profile }}
      AWS_SHARED_CREDENTIALS_FILE=/root/.aws/credentials
      AWS_CONFIG_FILE=/root/.aws/config
      ROUTE53_ZONE_NAME={{ route53_ddns_zone_name }}
      ROUTE53_HOSTED_ZONE_ID={{ route53_ddns_hosted_zone_id }}
      ROUTE53_RECORD_NAME={{ route53_ddns_record_name }}
      ROUTE53_TTL={{ route53_ddns_ttl }}
  when: route53_ddns_enabled

- name: Install Route53 DDNS systemd service
  ansible.builtin.copy:
    dest: /etc/systemd/system/route53-ddns.service
    mode: "0644"
    content: |
      [Unit]
      Description=Update Route53 DNS record with the current public IP
      Wants=network-online.target
      After=network-online.target

      [Service]
      Type=oneshot
      EnvironmentFile=/etc/route53-ddns.env
      ExecStart=/usr/local/bin/route53-ddns.sh
  notify: Reload systemd
  when: route53_ddns_enabled

- name: Install Route53 DDNS systemd timer
  ansible.builtin.copy:
    dest: /etc/systemd/system/route53-ddns.timer
    mode: "0644"
    content: |
      [Unit]
      Description=Run Route53 DDNS updater periodically

      [Timer]
      OnBootSec=2min
      OnUnitActiveSec={{ route53_ddns_interval }}
      Unit=route53-ddns.service
      Persistent=true

      [Install]
      WantedBy=timers.target
  notify: Reload systemd
  when: route53_ddns_enabled

- name: Flush Route53 DDNS handlers
  ansible.builtin.meta: flush_handlers
  when: route53_ddns_enabled

- name: Check whether Route53 DDNS has usable AWS credentials
  ansible.builtin.set_fact:
    route53_ddns_has_credentials: >-
      {{
        (aws_cli_profiles[route53_ddns_aws_profile] is defined)
        and ((aws_cli_profiles[route53_ddns_aws_profile].aws_access_key_id | default('')) | length > 0)
        and ((aws_cli_profiles[route53_ddns_aws_profile].aws_secret_access_key | default('')) | length > 0)
      }}
  when: route53_ddns_enabled

- name: Enable and start Route53 DDNS timer
  ansible.builtin.systemd:
    name: route53-ddns.timer
    state: started
    enabled: true
  when:
    - route53_ddns_enabled
    - route53_ddns_has_credentials | default(false)
    - not ansible_check_mode or 'route53-ddns.timer' in ansible_facts.services

- name: Disable Route53 DDNS timer until credentials are configured
  ansible.builtin.systemd:
    name: route53-ddns.timer
    state: stopped
    enabled: false
  when:
    - route53_ddns_enabled
    - not route53_ddns_has_credentials | default(false)
    - not ansible_check_mode or 'route53-ddns.timer' in ansible_facts.services

- name: Explain why Route53 DDNS timer is disabled
  ansible.builtin.debug:
    msg: >-
      Route53 DDNS is installed but disabled because AWS profile
      {{ route53_ddns_aws_profile }} is missing credentials.
      Populate aws_cli_profiles.{{ route53_ddns_aws_profile }} via ansible-vault,
      then rerun the playbook.
  when:
    - route53_ddns_enabled
    - not route53_ddns_has_credentials | default(false)
