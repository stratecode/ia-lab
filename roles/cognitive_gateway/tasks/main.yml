- name: Ensure cognitive gateway group exists
  ansible.builtin.group:
    name: "{{ cognitive_gateway_group }}"
    system: true
  when: cognitive_gateway_enabled

- name: Ensure cognitive gateway user exists
  ansible.builtin.user:
    name: "{{ cognitive_gateway_user }}"
    group: "{{ cognitive_gateway_group }}"
    home: "{{ cognitive_gateway_runtime_dir }}"
    shell: /usr/sbin/nologin
    system: true
    create_home: false
  when: cognitive_gateway_enabled

- name: Ensure cognitive gateway directories exist
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    owner: "{{ item.owner | default(cognitive_gateway_user) }}"
    group: "{{ item.group | default(cognitive_gateway_group) }}"
    mode: "{{ item.mode }}"
  loop:
    - { path: "{{ cognitive_gateway_runtime_dir }}", mode: "0755" }
    - { path: "{{ cognitive_gateway_config_dir }}", owner: "root", mode: "0750" }
    - { path: "{{ cognitive_gateway_log_dir }}", mode: "0755" }
  when: cognitive_gateway_enabled

- name: Install cognitive gateway binary
  ansible.builtin.copy:
    src: "{{ cognitive_gateway_binary_path }}"
    dest: "{{ cognitive_gateway_runtime_dir }}/cognitive-gateway"
    owner: "{{ cognitive_gateway_user }}"
    group: "{{ cognitive_gateway_group }}"
    mode: "0755"
  notify: Restart cognitive gateway services
  when: cognitive_gateway_enabled

- name: Install cognitive gateway configs
  ansible.builtin.copy:
    dest: "{{ cognitive_gateway_config_dir }}/{{ item.alias }}.json"
    owner: root
    group: "{{ cognitive_gateway_group }}"
    mode: "0640"
    content: |
      {
        "listen_addr": "0.0.0.0:{{ item.port }}",
        "default_mode": "{% if item.alias == 'planner' %}PLAN_MODE{% elif item.alias == 'utility' %}RESEARCH_MODE{% else %}CODE_MODE{% endif %}",
        "accepted_api_keys": ["{{ item.api_key }}"],
        "request_timeout_seconds": {{ cognitive_gateway_request_timeout_seconds }},
        "log_level": "{{ cognitive_gateway_log_level }}",
        "context_builder_url": "{% if cognitive_gateway_context_builder_enabled %}{{ cognitive_gateway_context_builder_url }}{% endif %}",
        "context_builder_api_key": "{% if cognitive_gateway_context_builder_enabled %}{{ cognitive_gateway_context_builder_api_key }}{% endif %}",
        "context_builder_required": {{ cognitive_gateway_context_builder_required | to_json }},
        "json_validation": {"warn_only": true},
        "operational_ir": {
          "enabled": {{ cognitive_gateway_ir_enabled | to_json }},
          "max_chars": {{ cognitive_gateway_ir_max_chars }},
          "plan_jsonata_required": {{ cognitive_gateway_plan_jsonata_required | to_json }}
        },
        "response_footer": {"enabled": true},
        "backends": {
          "coder": {
            "base_url": "http://127.0.0.1:{{ (llama_cpp_instances | selectattr('alias', 'equalto', 'coder') | map(attribute='port') | first | int) + cognitive_gateway_backend_port_offset | int }}/v1",
            "api_key": "{{ llama_cpp_instances | selectattr('alias', 'equalto', 'coder') | map(attribute='api_key') | first }}",
            "model": "coder"
          },
          "planner": {
            "base_url": "http://127.0.0.1:{{ (llama_cpp_instances | selectattr('alias', 'equalto', 'planner') | map(attribute='port') | first | int) + cognitive_gateway_backend_port_offset | int }}/v1",
            "api_key": "{{ llama_cpp_instances | selectattr('alias', 'equalto', 'planner') | map(attribute='api_key') | first }}",
            "model": "planner"
          },
          "utility": {
            "base_url": "http://127.0.0.1:{{ (llama_cpp_instances | selectattr('alias', 'equalto', 'utility') | map(attribute='port') | first | int) + cognitive_gateway_backend_port_offset | int }}/v1",
            "api_key": "{{ llama_cpp_instances | selectattr('alias', 'equalto', 'utility') | map(attribute='api_key') | first }}",
            "model": "utility"
          }
        },
        "modes": {
      {% for mode_name, mode_cfg in cognitive_gateway_modes.items() %}
          "{{ mode_name }}": {
            "route_to": "{{ mode_cfg.route_to }}",
            "system_prompt": {{ mode_cfg.system_prompt | to_json }},
            "policies": {{ mode_cfg.policies | to_json }},
            "middlewares": {{ cognitive_gateway_mode_middlewares | to_json }},
            "token_budget": {{ mode_cfg.token_budget | to_json }}
          }{% if not loop.last %},{% endif %}
      {% endfor %}
        }
      }
  loop: "{{ llama_cpp_instances | rejectattr('embedding_mode', 'equalto', true) | list }}"
  loop_control:
    label: "{{ item.alias }}"
  notify: Restart cognitive gateway services
  when: cognitive_gateway_enabled

- name: Install cognitive gateway systemd services
  ansible.builtin.copy:
    dest: "/etc/systemd/system/{{ item.service_name | regex_replace('^llama-cpp-', 'cognitive-gateway-') }}.service"
    owner: root
    group: root
    mode: "0644"
    content: |
      [Unit]
      Description=Cognitive Gateway ({{ item.alias }})
      After=network-online.target {{ item.service_name }}.service
      Wants=network-online.target
      Requires={{ item.service_name }}.service

      [Service]
      Type=simple
      User={{ cognitive_gateway_user }}
      Group={{ cognitive_gateway_group }}
      WorkingDirectory={{ cognitive_gateway_runtime_dir }}
      ExecStart={{ cognitive_gateway_runtime_dir }}/cognitive-gateway --config {{ cognitive_gateway_config_dir }}/{{ item.alias }}.json
      Restart=on-failure
      RestartSec=3
      NoNewPrivileges=true
      PrivateTmp=true
      ProtectSystem=strict
      ProtectHome=true
      ReadWritePaths={{ cognitive_gateway_log_dir }}
      StandardOutput=append:{{ cognitive_gateway_log_dir }}/{{ item.alias }}.log
      StandardError=append:{{ cognitive_gateway_log_dir }}/{{ item.alias }}.log

      [Install]
      WantedBy=multi-user.target
  loop: "{{ llama_cpp_instances | rejectattr('embedding_mode', 'equalto', true) | list }}"
  loop_control:
    label: "{{ item.alias }}"
  notify:
    - Reload systemd for cognitive gateway
    - Restart cognitive gateway services
  when: cognitive_gateway_enabled

- name: Enable and start cognitive gateway services
  ansible.builtin.systemd:
    name: "{{ item.service_name | regex_replace('^llama-cpp-', 'cognitive-gateway-') }}"
    state: started
    enabled: true
    daemon_reload: true
  loop: "{{ llama_cpp_instances | rejectattr('embedding_mode', 'equalto', true) | list }}"
  loop_control:
    label: "{{ item.alias }}"
  when: cognitive_gateway_enabled

- name: Wait for cognitive gateway health
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ item.port }}/health"
    return_content: true
  register: cognitive_gateway_health
  retries: 30
  delay: 2
  until: cognitive_gateway_health.status == 200
  loop: "{{ llama_cpp_instances | rejectattr('embedding_mode', 'equalto', true) | list }}"
  loop_control:
    label: "{{ item.alias }}"
  when:
    - cognitive_gateway_enabled
    - not ansible_check_mode
