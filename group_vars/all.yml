openclaw_owner_allow_from:
  - "telegram:{{ lookup('env', 'LAB_OPENCLAW_TELEGRAM_OWNER') | default(orchestrator_telegram_allowed_users, true) }}"
openclaw_update_auto_enabled: "{{ lookup('env', 'LAB_OPENCLAW_UPDATE_AUTO_ENABLED') | default('false', true) | bool }}"
