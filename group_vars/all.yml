# ─── Environment-driven variables ────────────────────────────────────────────
# REQUIRED: Export .env variables before running any Ansible command:
#   set -a && source .env && set +a
#   ansible-playbook playbooks/bootstrap.yml
#
# Without this, lookup('env', ...) returns empty strings and defaults are used.

# ─── Host & System ──────────────────────────────────────────────────────────
timezone: "{{ lookup('env', 'LAB_TIMEZONE') | default('Europe/Madrid', true) }}"
docker_user: "{{ lookup('env', 'LAB_USER') | default('admin', true) }}"
domain: "{{ lookup('env', 'LAB_DOMAIN') | default('localhost', true) }}"
docker_data_root: /opt/docker
enable_ipv6: false

# ─── Server Baseline ────────────────────────────────────────────────────────
server_baseline_enabled: true
server_root_lv_expand: true
server_root_lv_path: /dev/ubuntu-vg/ubuntu-lv
server_root_lv_size: +100%FREE
server_lan_cidr: "{{ lookup('env', 'LAB_LAN_CIDR') | default('192.168.0.0/24', true) }}"
docker_internal_cidr: "{{ lookup('env', 'LAB_DOCKER_INTERNAL_CIDR') | default('172.16.0.0/12', true) }}"
server_wifi_enabled: false
server_wifi_interface: wlp2s0
server_packages:
  - acl
  - bash-completion
  - docker.io
  - docker-compose-v2
  - ethtool
  - fail2ban
  - lm-sensors
  - mesa-vulkan-drivers
  - nvme-cli
  - prometheus-alertmanager
  - prometheus-node-exporter
  - smartmontools
  - tcpdump
  - vulkan-tools

# ─── Domains ────────────────────────────────────────────────────────────────
cockpit_domain: "{{ lookup('env', 'LAB_COCKPIT_DOMAIN') | default('lab.localhost', true) }}"
observability_domain: "{{ lookup('env', 'LAB_OBSERVABILITY_DOMAIN') | default('monitor.localhost', true) }}"
open_webui_domain: "{{ lookup('env', 'LAB_CHAT_DOMAIN') | default('chat.localhost', true) }}"

# ─── Monitor / Nginx / TLS ──────────────────────────────────────────────────
monitor_backend_port: 9091
monitor_tls_mode: "{{ lookup('env', 'LAB_TLS_MODE') | default('selfsigned', true) }}"
monitor_letsencrypt_email: "{{ lookup('env', 'LAB_LETSENCRYPT_EMAIL') | default('', true) }}"
monitor_letsencrypt_challenge: "{{ lookup('env', 'LAB_LETSENCRYPT_CHALLENGE') | default('dns-route53', true) }}"
monitor_letsencrypt_aws_profile: "{{ lookup('env', 'LAB_LETSENCRYPT_AWS_PROFILE') | default('route53-dns', true) }}"
monitor_absent_packages:
  - openipmi
monitor_pcp_services:
  - pmcd
  - pmproxy
  - pmie
  - pmlogger
monitor_pmie_disabled_groups:
  - dmthin
  - mssql

# ─── Grafana ────────────────────────────────────────────────────────────────
grafana_enabled: true
grafana_port: 3000
grafana_admin_user: admin
grafana_admin_password: "{{ vault_grafana_admin_password }}"

# ─── Retired AI stack flags ─────────────────────────────────────────────────
open_webui_enabled: false
aider_enabled: false
orchestrator_enabled: false

# ─── Alertmanager ───────────────────────────────────────────────────────────
alertmanager_enabled: true
alertmanager_port: 9093
alertmanager_slack_webhook_url: "{{ vault_alertmanager_slack_webhook_url | default('') }}"

# ─── llama.cpp (AI inference) ───────────────────────────────────────────────
llama_cpp_enabled: true
llama_cpp_user: llama-cpp
llama_cpp_group: llama-cpp
llama_cpp_root_dir: /opt/llama.cpp
llama_cpp_src_dir: /opt/llama.cpp/src
llama_cpp_build_dir: /opt/llama.cpp/build
llama_cpp_cache_dir: /srv/ai-lab/llama.cpp/cache
llama_cpp_host: 127.0.0.1
llama_cpp_build_jobs: "{{ lookup('env', 'LAB_LLAMA_BUILD_JOBS') | default('1', true) | int }}"
llama_cpp_build_async_seconds: "{{ lookup('env', 'LAB_LLAMA_BUILD_ASYNC_SECONDS') | default('14400', true) | int }}"
llama_cpp_build_poll_seconds: "{{ lookup('env', 'LAB_LLAMA_BUILD_POLL_SECONDS') | default('30', true) | int }}"
llama_cpp_instances:
  - service_name: llama-cpp-code
    host: "{{ llama_cpp_host }}"
    port: "{{ lookup('env', 'LAB_LLAMA_CODE_PORT') | default('8080', true) | int }}"
    hf_repo: "{{ lookup('env', 'LAB_LLAMA_CODE_MODEL') | default('Qwen/Qwen2.5-Coder-7B-Instruct-GGUF:Q4_K_M', true) }}"
    alias: codex-local
    ctx_size: "{{ lookup('env', 'LAB_LLAMA_CODE_CTX_SIZE') | default('24576', true) | int }}"
    recommended_ctx_size: 24576
    max_ctx_size: 32768
    threads: "{{ lookup('env', 'LAB_LLAMA_CODE_THREADS') | default('6', true) | int }}"
    parallel: "{{ lookup('env', 'LAB_LLAMA_CODE_PARALLEL') | default('1', true) | int }}"
    n_gpu_layers: "{{ lookup('env', 'LAB_LLAMA_CODE_GPU_LAYERS') | default('33', true) | int }}"
    api_key: "{{ lookup('env', 'LAB_LLAMA_CODE_API_KEY') | default('local-code', true) }}"
    instance_lifecycle: "always-on"
    priority: 1
    model_size_mb: 4100
    ram_estimation_override_mb: null
    vram_reservation_mb: 2200
    memory_max_mb: 10240
    gpu_fallback_policy: "reduce-layers"
    max_queued_requests: 4
    request_timeout_seconds: 180
    overload_policy: "queue"
    ram_suspend_threshold_percent: 90
    vram_suspend_threshold_percent: 95
    idle_timeout_seconds: 0
    capabilities:
      supports_tools: true
      supports_json_mode: true
      supports_reasoning: false
      supports_embeddings: false
    recommended_parallelism: 1
    recommended_context: 24576
    safe_max_context: 32768
    embedding_mode: false

# ─── llama.cpp Resource Budget & RAM Estimation ─────────────────────────────
# RAM estimation formula:
# estimated_ram_mb = (model_size_mb + kv_cache_mb) * safety_margin
# kv_cache_mb = (ctx_size * parallel * bytes_per_token) / 1024
# safety_margin = per-model-family factor from llama_cpp_ram_estimation_factors
#
# Default bytes_per_token by quantization:
#   Q4_K_M: 0.5 bytes/token/layer (heuristic)
#   Q8_0:   1.0 bytes/token/layer (heuristic)
#
# Simplified heuristic (used in validation):
# kv_cache_mb ≈ (ctx_size * parallel * 2) / 1024  (for Q4 models)
#
# MemoryMax (systemd) = estimated_ram_mb + 512 MB overhead
#
# Budget thresholds:
#   total <= budget              → pass (silent)
#   budget < total <= budget*1.10 → warning (non-fatal)
#   total > budget*1.10          → fail (fatal)

llama_cpp_ram_budget_mb: "{{ lookup('env', 'LAB_LLAMA_RAM_BUDGET_MB') | default('22937', true) | int }}"              # ~22.4GiB = 28GiB total with 20% reserved
llama_cpp_ram_budget_hard_limit_percent: "{{ lookup('env', 'LAB_LLAMA_RAM_HARD_LIMIT_PERCENT') | default('110', true) | int }}"  # Fail if exceeds budget by >10%
llama_cpp_thread_budget: "{{ lookup('env', 'LAB_LLAMA_THREAD_BUDGET') | default('16', true) | int }}"                 # Matches the 16 logical CPUs on the host
llama_cpp_vram_total_mb: "{{ lookup('env', 'LAB_LLAMA_VRAM_TOTAL_MB') | default('4096', true) | int }}"              # AMD iGPU VRAM

# Per-model-family safety margin factors
llama_cpp_ram_estimation_factors:
  qwen2.5:
    safety_margin: 1.15                    # 15% safety margin
    bytes_per_token_q4: 0.5
    bytes_per_token_q8: 1.0
  nomic:
    safety_margin: 1.10                    # 10% safety margin
    bytes_per_token_q8: 0.8
  bge:
    safety_margin: 1.15
    bytes_per_token_q8: 1.0
  qwen3-embedding:
    safety_margin: 1.15
    bytes_per_token_q8: 1.0
  default:
    safety_margin: 1.20                    # 20% for unknown models
    bytes_per_token_q4: 0.6
    bytes_per_token_q8: 1.1

# GPU scheduling priority (highest VRAM priority first)
llama_cpp_gpu_priority_order:
  - llama-cpp-code
# Runtime resource monitoring thresholds
# Used by the monitoring timer to detect resource pressure and trigger
# suspension or degradation policies (Requirements 15.1, 15.2, 23.4)
llama_cpp_monitoring:
  check_interval_seconds: 30
  thresholds:
    warning_ram_percent: 80
    throttle_ram_percent: 85
    suspend_ram_percent: 90
    critical_ram_percent: 95
    warning_vram_percent: 85
    suspend_vram_percent: 95

# ─── Route53 DDNS ───────────────────────────────────────────────────────────
route53_ddns_enabled: true
route53_ddns_zone_name: "{{ lookup('env', 'LAB_DNS_ZONE_NAME') | default('example.com', true) }}"
route53_ddns_hosted_zone_id: "{{ lookup('env', 'LAB_DNS_HOSTED_ZONE_ID') | default('', true) }}"
route53_ddns_record_name: "{{ lookup('env', 'LAB_DNS_RECORD_NAME') | default('vpn.example.com', true) }}"
route53_ddns_ttl: 300
route53_ddns_interval: "5min"
route53_ddns_aws_profile: "{{ lookup('env', 'LAB_DNS_AWS_PROFILE') | default('route53-dns', true) }}"
aws_cli_profiles: "{{ vault_aws_cli_profiles | default({}) }}"

# ─── WireGuard ──────────────────────────────────────────────────────────────
wireguard_enabled: true
wireguard_interface: wg0
wireguard_listen_port: "{{ lookup('env', 'LAB_WG_PORT') | default('51820', true) | int }}"
wireguard_subnet: "{{ lookup('env', 'LAB_WG_SUBNET') | default('10.66.66.0/24', true) }}"
wireguard_server_address: "{{ lookup('env', 'LAB_WG_SERVER_ADDRESS') | default('10.66.66.1/24', true) }}"
wireguard_server_ip: "{{ lookup('env', 'LAB_WG_SERVER_IP') | default('10.66.66.1', true) }}"
wireguard_endpoint: "{{ route53_ddns_record_name }}"
wireguard_endpoint_port: "{{ wireguard_listen_port }}"
wireguard_dns_servers:
  - 1.1.1.1
  - 1.0.0.1
wireguard_allowed_ips:
  - "{{ wireguard_subnet }}"
  - "{{ server_lan_cidr }}"
wireguard_persistent_keepalive: 25
wireguard_clients:
  - name: primary
    address: "{{ lookup('env', 'LAB_WG_CLIENT_ADDRESS') | default('10.66.66.2/32', true) }}"

# ─── Codex local gateway ────────────────────────────────────────────────────
codex_gateway_enabled: true
codex_gateway_domain: "{{ lookup('env', 'LAB_CODEX_GATEWAY_DOMAIN') | default('codex.' ~ domain, true) }}"
codex_gateway_user: codex-gateway
codex_gateway_group: codex-gateway
codex_gateway_root_dir: /srv/ai-lab/codex-local-gateway
codex_gateway_runtime_dir: /srv/ai-lab/codex-local-gateway/runtime
codex_gateway_config_dir: /etc/codex-local-gateway
codex_gateway_log_dir: /var/log/codex-local-gateway
codex_gateway_binary_path: "{{ lookup('env', 'LAB_CODEX_GATEWAY_BINARY_PATH') | default(inventory_dir ~ '/dist/codex-local-gateway-linux-amd64', true) }}"
codex_gateway_addr: "{{ lookup('env', 'LAB_CODEX_GATEWAY_ADDR') | default('127.0.0.1:8180', true) }}"
codex_gateway_public_base_url: "https://{{ codex_gateway_domain }}/v1"
codex_gateway_api_key: "{{ lookup('env', 'LAB_CODEX_GATEWAY_API_KEY') | default(vault_codex_gateway_api_key | default(lookup('password', lookup('env', 'HOME') ~ '/.config/stratecode-lab/codex_gateway_api_key length=48 chars=ascii_letters,digits'), true), true) }}"
codex_gateway_upstream_base_url: "http://127.0.0.1:{{ (llama_cpp_instances | first).port }}/v1"
codex_gateway_upstream_api_key: "{{ (llama_cpp_instances | first).api_key }}"
codex_gateway_model: "{{ lookup('env', 'LAB_CODEX_GATEWAY_MODEL') | default('qwen-local-code', true) }}"
codex_gateway_upstream_model: "{{ lookup('env', 'LAB_CODEX_GATEWAY_UPSTREAM_MODEL') | default('codex-local', true) }}"
codex_gateway_request_timeout_seconds: "{{ lookup('env', 'LAB_CODEX_GATEWAY_REQUEST_TIMEOUT_SECONDS') | default('180', true) | int }}"
codex_gateway_max_body_bytes: "{{ lookup('env', 'LAB_CODEX_GATEWAY_MAX_BODY_BYTES') | default('2097152', true) | int }}"
codex_gateway_rate_limit_rpm: "{{ lookup('env', 'LAB_CODEX_GATEWAY_RATE_LIMIT_RPM') | default('120', true) | int }}"
codex_gateway_rate_limit_burst: "{{ lookup('env', 'LAB_CODEX_GATEWAY_RATE_LIMIT_BURST') | default('20', true) | int }}"
codex_gateway_default_max_output_tokens: "{{ lookup('env', 'LAB_CODEX_GATEWAY_DEFAULT_MAX_OUTPUT_TOKENS') | default('4096', true) | int }}"
codex_gateway_context_window: "{{ lookup('env', 'LAB_CODEX_GATEWAY_CONTEXT_WINDOW') | default('12000', true) | int }}"
codex_gateway_auto_compact_token_limit: "{{ lookup('env', 'LAB_CODEX_GATEWAY_AUTO_COMPACT_TOKEN_LIMIT') | default('8000', true) | int }}"
codex_gateway_max_prompt_chars: "{{ lookup('env', 'LAB_CODEX_GATEWAY_MAX_PROMPT_CHARS') | default('30000', true) | int }}"
codex_gateway_response_store_ttl_minutes: "{{ lookup('env', 'LAB_CODEX_GATEWAY_RESPONSE_STORE_TTL_MINUTES') | default('30', true) | int }}"
codex_gateway_response_store_max_entries: "{{ lookup('env', 'LAB_CODEX_GATEWAY_RESPONSE_STORE_MAX_ENTRIES') | default('256', true) | int }}"

# ─── Codex remote host runtime ──────────────────────────────────────────────
codex_host_enabled: true
codex_host_user: codex
codex_host_group: codex
codex_host_root_dir: /srv/ai-lab/codex
codex_host_repos_dir: /srv/ai-lab/codex/repos
codex_host_worktrees_dir: /srv/ai-lab/codex/worktrees
codex_host_cache_dir: /srv/ai-lab/codex/cache
codex_host_log_dir: /var/log/codex
codex_host_cleanup_retention_hours: "{{ lookup('env', 'LAB_CODEX_WORKTREE_RETENTION_HOURS') | default('24', true) | int }}"
codex_host_install_cli: "{{ lookup('env', 'LAB_CODEX_INSTALL_CLI') | default('false', true) | bool }}"
codex_host_packages:
  - git
  - nodejs
  - python3
  - python3-venv
  - pipx
  - build-essential
  - ripgrep
  - fd-find
  - jq
  - docker.io
  - docker-compose-v2
