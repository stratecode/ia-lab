# ─── Environment-driven variables ────────────────────────────────────────────
# REQUIRED: Export .env variables before running any Ansible command:
#   set -a && source .env && set +a
#   ansible-playbook playbooks/bootstrap.yml
#
# Without this, lookup('env', ...) returns empty strings and defaults are used.

# ─── Host & System ──────────────────────────────────────────────────────────
timezone: "{{ lookup('env', 'LAB_TIMEZONE') | default('Europe/Madrid', true) }}"
docker_user: "{{ lookup('env', 'LAB_USER') | default('admin', true) }}"
domain: "{{ lookup('env', 'LAB_DOMAIN') | default('localhost', true) }}"
docker_data_root: /opt/docker
enable_ipv6: false

# ─── Server Baseline ────────────────────────────────────────────────────────
server_baseline_enabled: true
server_root_lv_expand: true
server_root_lv_path: /dev/ubuntu-vg/ubuntu-lv
server_root_lv_size: +100%FREE
server_lan_cidr: "{{ lookup('env', 'LAB_LAN_CIDR') | default('192.168.0.0/24', true) }}"
docker_internal_cidr: "{{ lookup('env', 'LAB_DOCKER_INTERNAL_CIDR') | default('172.16.0.0/12', true) }}"
server_wifi_enabled: false
server_wifi_interface: wlp2s0
server_packages:
  - acl
  - bash-completion
  - docker.io
  - docker-compose-v2
  - ethtool
  - fail2ban
  - lm-sensors
  - mesa-vulkan-drivers
  - nvme-cli
  - prometheus-alertmanager
  - prometheus-node-exporter
  - smartmontools
  - tcpdump
  - vulkan-tools

# ─── Domains ────────────────────────────────────────────────────────────────
cockpit_domain: "{{ lookup('env', 'LAB_COCKPIT_DOMAIN') | default('lab.localhost', true) }}"
observability_domain: "{{ lookup('env', 'LAB_OBSERVABILITY_DOMAIN') | default('monitor.localhost', true) }}"
open_webui_domain: "{{ lookup('env', 'LAB_CHAT_DOMAIN') | default('chat.localhost', true) }}"

# ─── Monitor / Nginx / TLS ──────────────────────────────────────────────────
monitor_backend_port: 9091
monitor_tls_mode: "{{ lookup('env', 'LAB_TLS_MODE') | default('selfsigned', true) }}"
monitor_letsencrypt_email: "{{ lookup('env', 'LAB_LETSENCRYPT_EMAIL') | default('', true) }}"
monitor_letsencrypt_challenge: "{{ lookup('env', 'LAB_LETSENCRYPT_CHALLENGE') | default('dns-route53', true) }}"
monitor_letsencrypt_aws_profile: "{{ lookup('env', 'LAB_LETSENCRYPT_AWS_PROFILE') | default('route53-dns', true) }}"
monitor_absent_packages:
  - openipmi
monitor_pcp_services:
  - pmcd
  - pmproxy
  - pmie
  - pmlogger
monitor_pmie_disabled_groups:
  - dmthin
  - mssql

# ─── Grafana ────────────────────────────────────────────────────────────────
grafana_enabled: true
grafana_port: 3000
grafana_admin_user: admin
grafana_admin_password: "{{ vault_grafana_admin_password }}"

# ─── Open WebUI ─────────────────────────────────────────────────────────────
open_webui_enabled: true
open_webui_port: 3001
open_webui_name: "StrateCode Chat"
open_webui_version: "{{ lookup('env', 'LAB_OPEN_WEBUI_VERSION') | default('v0.9.5', true) }}"
open_webui_secret_key: "{{ lookup('env', 'LAB_OPEN_WEBUI_SECRET_KEY') | default('change-me-open-webui-secret', true) }}"
open_webui_enable_signup: "{{ lookup('env', 'LAB_OPEN_WEBUI_ENABLE_SIGNUP') | default('true', true) | bool }}"
open_webui_model_list_timeout: 30
open_webui_request_timeout: 180
open_webui_public_cname_target: "{{ lookup('env', 'LAB_CHAT_CNAME_TARGET') | default(route53_ddns_record_name, true) }}"
open_webui_connections:
  - name: coder
    url: "http://host.docker.internal:{{ (llama_cpp_instances | selectattr('alias', 'equalto', 'coder') | map(attribute='port') | first) }}/v1"
    api_key: "{{ llama_cpp_instances | selectattr('alias', 'equalto', 'coder') | map(attribute='api_key') | first }}"
  - name: planner
    url: "http://host.docker.internal:{{ (llama_cpp_instances | selectattr('alias', 'equalto', 'planner') | map(attribute='port') | first) }}/v1"
    api_key: "{{ llama_cpp_instances | selectattr('alias', 'equalto', 'planner') | map(attribute='api_key') | first }}"
  - name: utility
    url: "http://host.docker.internal:{{ (llama_cpp_instances | selectattr('alias', 'equalto', 'utility') | map(attribute='port') | first) }}/v1"
    api_key: "{{ llama_cpp_instances | selectattr('alias', 'equalto', 'utility') | map(attribute='api_key') | first }}"
  - name: orchestrator-tools
    url: "https://{{ cockpit_domain }}{{ orchestrator_proxy_path | regex_replace('/$','') }}/v1"
    api_key: "{{ orchestrator_open_webui_api_key }}"

# ─── Alertmanager ───────────────────────────────────────────────────────────
alertmanager_enabled: true
alertmanager_port: 9093
alertmanager_slack_webhook_url: "{{ vault_alertmanager_slack_webhook_url | default('') }}"

# ─── llama.cpp (AI inference) ───────────────────────────────────────────────
llama_cpp_enabled: true
llama_cpp_user: llama-cpp
llama_cpp_group: llama-cpp
llama_cpp_root_dir: /opt/llama.cpp
llama_cpp_src_dir: /opt/llama.cpp/src
llama_cpp_build_dir: /opt/llama.cpp/build
llama_cpp_cache_dir: /srv/ai-lab/llama.cpp/cache
llama_cpp_build_jobs: "{{ lookup('env', 'LAB_LLAMA_BUILD_JOBS') | default('4', true) | int }}"
llama_cpp_build_async_seconds: "{{ lookup('env', 'LAB_LLAMA_BUILD_ASYNC_SECONDS') | default('14400', true) | int }}"
llama_cpp_build_poll_seconds: "{{ lookup('env', 'LAB_LLAMA_BUILD_POLL_SECONDS') | default('30', true) | int }}"
llama_cpp_instances:
  # ── Code instance (priority 1 — always-on) ────────────────────────────────
  - service_name: llama-cpp-code
    port: "{{ lookup('env', 'LAB_LLAMA_CODE_PORT') | default('8080', true) | int }}"
    hf_repo: "{{ lookup('env', 'LAB_LLAMA_CODE_MODEL') | default('Qwen/Qwen2.5-Coder-7B-Instruct-GGUF:Q4_K_M', true) }}"
    alias: coder
    ctx_size: "{{ lookup('env', 'LAB_LLAMA_CODE_CTX_SIZE') | default('32000', true) | int }}"
    recommended_ctx_size: 16384
    max_ctx_size: 32768
    threads: "{{ lookup('env', 'LAB_LLAMA_CODE_THREADS') | default('6', true) | int }}"
    parallel: "{{ lookup('env', 'LAB_LLAMA_CODE_PARALLEL') | default('2', true) | int }}"
    n_gpu_layers: "{{ lookup('env', 'LAB_LLAMA_CODE_GPU_LAYERS') | default('33', true) | int }}"
    api_key: "{{ lookup('env', 'LAB_LLAMA_CODE_API_KEY') | default('local-code', true) }}"
    instance_lifecycle: "always-on"
    priority: 1
    model_size_mb: 4100
    ram_estimation_override_mb: null
    vram_reservation_mb: 2200
    memory_max_mb: 6144
    gpu_fallback_policy: "reduce-layers"
    max_queued_requests: 8
    request_timeout_seconds: 120
    overload_policy: "queue"
    ram_suspend_threshold_percent: 90
    vram_suspend_threshold_percent: 95
    idle_timeout_seconds: 0
    capabilities:
      supports_tools: true
      supports_json_mode: true
      supports_reasoning: false
      supports_embeddings: false
    recommended_parallelism: 2
    recommended_context: 16384
    safe_max_context: 32768
    embedding_mode: false

  # ── Planner instance (priority 2 — warm) ──────────────────────────────────
  - service_name: llama-cpp-planner
    port: "{{ lookup('env', 'LAB_LLAMA_PLANNER_PORT') | default('8082', true) | int }}"
    hf_repo: "{{ lookup('env', 'LAB_LLAMA_PLANNER_MODEL') | default('Qwen/Qwen2.5-3B-Instruct-GGUF:Q4_K_M', true) }}"
    alias: planner
    ctx_size: "{{ lookup('env', 'LAB_LLAMA_PLANNER_CTX_SIZE') | default('16384', true) | int }}"
    recommended_ctx_size: 8192
    max_ctx_size: 32768
    threads: "{{ lookup('env', 'LAB_LLAMA_PLANNER_THREADS') | default('4', true) | int }}"
    parallel: "{{ lookup('env', 'LAB_LLAMA_PLANNER_PARALLEL') | default('2', true) | int }}"
    n_gpu_layers: "{{ lookup('env', 'LAB_LLAMA_PLANNER_GPU_LAYERS') | default('20', true) | int }}"
    api_key: "{{ lookup('env', 'LAB_LLAMA_PLANNER_API_KEY') | default('local-planner', true) }}"
    instance_lifecycle: "warm"
    priority: 2
    model_size_mb: 1900
    ram_estimation_override_mb: null
    vram_reservation_mb: 900
    memory_max_mb: 4096
    gpu_fallback_policy: "reduce-layers"
    max_queued_requests: 8
    request_timeout_seconds: 90
    overload_policy: "queue"
    ram_suspend_threshold_percent: 85
    vram_suspend_threshold_percent: 90
    idle_timeout_seconds: 300
    capabilities:
      supports_tools: true
      supports_json_mode: true
      supports_reasoning: true
      supports_embeddings: false
    recommended_parallelism: 2
    recommended_context: 8192
    safe_max_context: 16384
    embedding_mode: false

  # ── Utility instance (priority 3 — lazy) ──────────────────────────────────
  - service_name: llama-cpp-utility
    port: "{{ lookup('env', 'LAB_LLAMA_UTILITY_PORT') | default('8083', true) | int }}"
    hf_repo: "{{ lookup('env', 'LAB_LLAMA_UTILITY_MODEL') | default('Qwen/Qwen2.5-1.5B-Instruct-GGUF:Q4_K_M', true) }}"
    alias: utility
    ctx_size: "{{ lookup('env', 'LAB_LLAMA_UTILITY_CTX_SIZE') | default('8192', true) | int }}"
    recommended_ctx_size: 4096
    max_ctx_size: 32768
    threads: "{{ lookup('env', 'LAB_LLAMA_UTILITY_THREADS') | default('4', true) | int }}"
    parallel: "{{ lookup('env', 'LAB_LLAMA_UTILITY_PARALLEL') | default('1', true) | int }}"
    n_gpu_layers: "{{ lookup('env', 'LAB_LLAMA_UTILITY_GPU_LAYERS') | default('16', true) | int }}"
    api_key: "{{ lookup('env', 'LAB_LLAMA_UTILITY_API_KEY') | default('local-utility', true) }}"
    instance_lifecycle: "lazy"
    priority: 3
    model_size_mb: 950
    ram_estimation_override_mb: null
    vram_reservation_mb: 384
    memory_max_mb: 3072
    gpu_fallback_policy: "reduce-layers"
    max_queued_requests: 4
    request_timeout_seconds: 60
    overload_policy: "reject"
    ram_suspend_threshold_percent: 80
    vram_suspend_threshold_percent: 0
    idle_timeout_seconds: 180
    capabilities:
      supports_tools: true
      supports_json_mode: true
      supports_reasoning: false
      supports_embeddings: false
    recommended_parallelism: 1
    recommended_context: 4096
    safe_max_context: 8192
    embedding_mode: false

  # ── Embeddings instance (priority 4 — warm) ───────────────────────────────
  - service_name: llama-cpp-embeddings
    port: "{{ lookup('env', 'LAB_LLAMA_EMBEDDINGS_PORT') | default('8084', true) | int }}"
    hf_repo: "{{ lookup('env', 'LAB_LLAMA_EMBEDDINGS_MODEL') | default('gpustack/bge-m3-GGUF:Q8_0', true) }}"
    alias: embeddings
    ctx_size: "{{ lookup('env', 'LAB_LLAMA_EMBEDDINGS_CTX_SIZE') | default('8192', true) | int }}"
    recommended_ctx_size: 2048
    max_ctx_size: 8192
    threads: "{{ lookup('env', 'LAB_LLAMA_EMBEDDINGS_THREADS') | default('2', true) | int }}"
    parallel: "{{ lookup('env', 'LAB_LLAMA_EMBEDDINGS_PARALLEL') | default('2', true) | int }}"
    n_gpu_layers: "{{ lookup('env', 'LAB_LLAMA_EMBEDDINGS_GPU_LAYERS') | default('99', true) | int }}"
    api_key: "{{ lookup('env', 'LAB_LLAMA_EMBEDDINGS_API_KEY') | default('local-embeddings', true) }}"
    instance_lifecycle: "warm"
    priority: 4
    model_size_mb: 750
    ram_estimation_override_mb: null
    vram_reservation_mb: 192
    memory_max_mb: 1536
    gpu_fallback_policy: "reduce-layers"
    max_queued_requests: 32
    request_timeout_seconds: 30
    overload_policy: "queue"
    ram_suspend_threshold_percent: 80
    vram_suspend_threshold_percent: 0
    idle_timeout_seconds: 600
    capabilities:
      supports_tools: false
      supports_json_mode: false
      supports_reasoning: false
      supports_embeddings: true
    recommended_parallelism: 4
    recommended_context: 2048
    safe_max_context: 8192
    embedding_mode: true

# ─── llama.cpp Resource Budget & RAM Estimation ─────────────────────────────
# RAM estimation formula:
# estimated_ram_mb = (model_size_mb + kv_cache_mb) * safety_margin
# kv_cache_mb = (ctx_size * parallel * bytes_per_token) / 1024
# safety_margin = per-model-family factor from llama_cpp_ram_estimation_factors
#
# Default bytes_per_token by quantization:
#   Q4_K_M: 0.5 bytes/token/layer (heuristic)
#   Q8_0:   1.0 bytes/token/layer (heuristic)
#
# Simplified heuristic (used in validation):
# kv_cache_mb ≈ (ctx_size * parallel * 2) / 1024  (for Q4 models)
#
# MemoryMax (systemd) = estimated_ram_mb + 512 MB overhead
#
# Budget thresholds:
#   total <= budget              → pass (silent)
#   budget < total <= budget*1.10 → warning (non-fatal)
#   total > budget*1.10          → fail (fatal)

llama_cpp_ram_budget_mb: "{{ lookup('env', 'LAB_LLAMA_RAM_BUDGET_MB') | default('22937', true) | int }}"              # ~22.4GiB = 28GiB total with 20% reserved
llama_cpp_ram_budget_hard_limit_percent: "{{ lookup('env', 'LAB_LLAMA_RAM_HARD_LIMIT_PERCENT') | default('110', true) | int }}"  # Fail if exceeds budget by >10%
llama_cpp_thread_budget: "{{ lookup('env', 'LAB_LLAMA_THREAD_BUDGET') | default('16', true) | int }}"                 # Matches the 16 logical CPUs on the host
llama_cpp_vram_total_mb: "{{ lookup('env', 'LAB_LLAMA_VRAM_TOTAL_MB') | default('4096', true) | int }}"              # AMD iGPU VRAM

# Per-model-family safety margin factors
llama_cpp_ram_estimation_factors:
  qwen2.5:
    safety_margin: 1.15                    # 15% safety margin
    bytes_per_token_q4: 0.5
    bytes_per_token_q8: 1.0
  nomic:
    safety_margin: 1.10                    # 10% safety margin
    bytes_per_token_q8: 0.8
  bge:
    safety_margin: 1.15
    bytes_per_token_q8: 1.0
  qwen3-embedding:
    safety_margin: 1.15
    bytes_per_token_q8: 1.0
  default:
    safety_margin: 1.20                    # 20% for unknown models
    bytes_per_token_q4: 0.6
    bytes_per_token_q8: 1.1

# GPU scheduling priority (highest VRAM priority first)
llama_cpp_gpu_priority_order:
  - llama-cpp-code        # Highest VRAM priority
  - llama-cpp-planner     # Medium VRAM priority
  - llama-cpp-utility     # Low, GPU opportunistic
  - llama-cpp-embeddings  # GPU opportunistic

# ─── Cognitive Gateway (OpenAI-compatible inference gateway) ───────────────
cognitive_gateway_enabled: "{{ lookup('env', 'LAB_COGNITIVE_GATEWAY_ENABLED') | default('true', true) | bool }}"
cognitive_gateway_user: cognitive-gateway
cognitive_gateway_group: cognitive-gateway
cognitive_gateway_config_dir: /etc/cognitive-gateway
cognitive_gateway_runtime_dir: /srv/ai-lab/cognitive-gateway/runtime
cognitive_gateway_log_dir: /var/log/cognitive-gateway
cognitive_gateway_binary_path: "{{ lookup('env', 'LAB_COGNITIVE_GATEWAY_BINARY_PATH') | default(inventory_dir ~ '/dist/cognitive-gateway-linux-amd64', true) }}"
cognitive_gateway_backend_port_offset: "{{ lookup('env', 'LAB_COGNITIVE_GATEWAY_BACKEND_PORT_OFFSET') | default('10000', true) | int }}"
cognitive_gateway_log_level: "{{ lookup('env', 'LAB_COGNITIVE_GATEWAY_LOG_LEVEL') | default('info', true) }}"
cognitive_gateway_request_timeout_seconds: "{{ lookup('env', 'LAB_COGNITIVE_GATEWAY_REQUEST_TIMEOUT_SECONDS') | default('180', true) | int }}"
cognitive_gateway_context_builder_enabled: "{{ lookup('env', 'LAB_COGNITIVE_GATEWAY_CONTEXT_BUILDER_ENABLED') | default('true', true) | bool }}"
cognitive_gateway_context_builder_url: "{{ lookup('env', 'LAB_COGNITIVE_GATEWAY_CONTEXT_BUILDER_URL') | default('http://127.0.0.1:' ~ orchestrator_port ~ '/context/build', true) }}"
cognitive_gateway_context_builder_api_key: "{{ lookup('env', 'LAB_COGNITIVE_GATEWAY_CONTEXT_BUILDER_API_KEY') | default(orchestrator_open_webui_api_key, true) }}"
cognitive_gateway_context_builder_required: "{{ lookup('env', 'LAB_COGNITIVE_GATEWAY_CONTEXT_BUILDER_REQUIRED') | default('false', true) | bool }}"
cognitive_gateway_ir_enabled: "{{ lookup('env', 'LAB_COGNITIVE_GATEWAY_IR_ENABLED') | default('true', true) | bool }}"
cognitive_gateway_ir_max_chars: "{{ lookup('env', 'LAB_COGNITIVE_GATEWAY_IR_MAX_CHARS') | default('6000', true) | int }}"
cognitive_gateway_plan_jsonata_required: "{{ lookup('env', 'LAB_COGNITIVE_GATEWAY_PLAN_JSONATA_REQUIRED') | default('true', true) | bool }}"
cognitive_gateway_mode_middlewares:
  - sanitize
  - mode_prompt
  - policy
  - retrieval_hook
  - budget
  - compress
cognitive_gateway_modes:
  PLAN_MODE:
    route_to: planner
    system_prompt: "You are operating in PLAN_MODE. Produce structured, executable plans. Preserve constraints, dependencies, approvals and human validation points."
    policies:
      - "Return operationally useful output, not generic advice."
      - "Respect workspace, approval and execution-target constraints."
    token_budget:
      max_prompt_tokens: 14000
      max_completion_tokens: 2000
  CODE_MODE:
    route_to: coder
    system_prompt: "You are operating in CODE_MODE. Focus on precise implementation, minimal diffs, tests, and explicit failure reporting."
    policies:
      - "Do not invent files or APIs without evidence."
      - "Prefer safe, testable changes and preserve user work."
    token_budget:
      max_prompt_tokens: 28000
      max_completion_tokens: 4000
  REVIEW_MODE:
    route_to: coder
    system_prompt: "You are operating in REVIEW_MODE. Prioritize bugs, regressions, missing tests, security and operational risks."
    policies:
      - "Findings first; avoid praise as a substitute for verification."
      - "Reference concrete files, outputs or artifacts when available."
    token_budget:
      max_prompt_tokens: 24000
      max_completion_tokens: 3000
  RESEARCH_MODE:
    route_to: utility
    system_prompt: "You are operating in RESEARCH_MODE. Synthesize evidence, cite sources when present, and separate facts from assumptions."
    policies:
      - "Prefer concise, source-grounded context."
      - "Call out uncertainty explicitly."
    token_budget:
      max_prompt_tokens: 7000
      max_completion_tokens: 1500

# Runtime resource monitoring thresholds
# Used by the monitoring timer to detect resource pressure and trigger
# suspension or degradation policies (Requirements 15.1, 15.2, 23.4)
llama_cpp_monitoring:
  check_interval_seconds: 30
  thresholds:
    warning_ram_percent: 80
    throttle_ram_percent: 85
    suspend_ram_percent: 90
    critical_ram_percent: 95
    warning_vram_percent: 85
    suspend_vram_percent: 95

# ─── Route53 DDNS ───────────────────────────────────────────────────────────
route53_ddns_enabled: true
route53_ddns_zone_name: "{{ lookup('env', 'LAB_DNS_ZONE_NAME') | default('example.com', true) }}"
route53_ddns_hosted_zone_id: "{{ lookup('env', 'LAB_DNS_HOSTED_ZONE_ID') | default('', true) }}"
route53_ddns_record_name: "{{ lookup('env', 'LAB_DNS_RECORD_NAME') | default('vpn.example.com', true) }}"
route53_ddns_ttl: 300
route53_ddns_interval: "5min"
route53_ddns_aws_profile: "{{ lookup('env', 'LAB_DNS_AWS_PROFILE') | default('route53-dns', true) }}"
aws_cli_profiles: "{{ vault_aws_cli_profiles | default({}) }}"

# ─── WireGuard ──────────────────────────────────────────────────────────────
wireguard_enabled: true
wireguard_interface: wg0
wireguard_listen_port: "{{ lookup('env', 'LAB_WG_PORT') | default('51820', true) | int }}"
wireguard_subnet: "{{ lookup('env', 'LAB_WG_SUBNET') | default('10.66.66.0/24', true) }}"
wireguard_server_address: "{{ lookup('env', 'LAB_WG_SERVER_ADDRESS') | default('10.66.66.1/24', true) }}"
wireguard_server_ip: "{{ lookup('env', 'LAB_WG_SERVER_IP') | default('10.66.66.1', true) }}"
wireguard_endpoint: "{{ route53_ddns_record_name }}"
wireguard_endpoint_port: "{{ wireguard_listen_port }}"
wireguard_dns_servers:
  - 1.1.1.1
  - 1.0.0.1
wireguard_allowed_ips:
  - "{{ wireguard_subnet }}"
  - "{{ server_lan_cidr }}"
wireguard_persistent_keepalive: 25
wireguard_clients:
  - name: primary
    address: "{{ lookup('env', 'LAB_WG_CLIENT_ADDRESS') | default('10.66.66.2/32', true) }}"

# ─── Aider (AI coding agent runtime) ───────────────────────────────────────
aider_enabled: true

# Runtime configuration (from LAB_AIDER_* environment variables)
aider_task_timeout: "{{ lookup('env', 'LAB_AIDER_TASK_TIMEOUT') | default('600', true) | int }}"
aider_test_timeout: "{{ lookup('env', 'LAB_AIDER_TEST_TIMEOUT') | default('300', true) | int }}"
aider_max_concurrent: "{{ lookup('env', 'LAB_AIDER_MAX_CONCURRENT') | default('2', true) | int }}"
aider_queue_timeout: "{{ lookup('env', 'LAB_AIDER_QUEUE_TIMEOUT') | default('300', true) | int }}"
aider_max_workspace_disk: "{{ lookup('env', 'LAB_AIDER_MAX_WORKSPACE_DISK') | default('10737418240', true) | int }}"
aider_max_workspace_size: "{{ lookup('env', 'LAB_AIDER_MAX_WORKSPACE_SIZE') | default('1073741824', true) | int }}"
aider_edit_format: "{{ lookup('env', 'LAB_AIDER_EDIT_FORMAT') | default('whole', true) }}"
aider_map_tokens: "{{ lookup('env', 'LAB_AIDER_MAP_TOKENS') | default('1024', true) | int }}"
aider_max_chat_history_tokens: "{{ lookup('env', 'LAB_AIDER_MAX_CHAT_HISTORY_TOKENS') | default('2048', true) | int }}"
aider_model_name: "{{ lookup('env', 'LAB_AIDER_MODEL_NAME') | default('coder', true) }}"
aider_default_mode: "{{ lookup('env', 'LAB_AIDER_DEFAULT_MODE') | default('autonomous', true) }}"
aider_api_base: "{{ lookup('env', 'LAB_AIDER_API_BASE') | default('http://127.0.0.1:8080/v1', true) }}"
aider_api_key: "{{ lookup('env', 'LAB_LLAMA_CODE_API_KEY') | default('local-code', true) }}"

# Protected branches — the agent cannot commit to these branches
aider_protected_branches:
  - main
  - master
  - develop

# Repository configuration — defines which repositories the agent can operate on
# Each entry specifies access controls, execution policies, and resource limits
aider_repositories:
  - repo_name: my-project
    repo_path: /srv/ai-lab/repos/my-project
    default_branch: main
    test_command: "pytest -x --tb=short"
    access_mode: full-edit          # full-edit | review-only | readonly
    execution_mode: autonomous      # autonomous | supervised | dry-run
    scope_paths: []                 # default: full repo
    max_indexed_files: 100
    file_modification_policy:
      max_files_modified: 20
      max_lines_changed: 500
      forbidden_paths:
        - "*.env"
        - "secrets/"
        - ".git/"
      forbidden_extensions:
        - ".pem"
        - ".key"
    resource_profile:
      context_limit: 16000
      concurrency_limit: 1
      task_timeout_override: 600
      test_timeout_override: 300
      sandbox_mode: none            # none | docker (deferred)
      allowed_tools: []
      token_budget:
        max_prompt_tokens: 16000
        max_completion_tokens: 8000
