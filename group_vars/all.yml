orchestrator_cleanup_api_key: "{{ lookup('env', 'LAB_ORCHESTRATOR_CLEANUP_API_KEY') | default('', true) }}"
orchestrator_benchmark_key_name: "{{ lookup('env', 'LAB_ORCHESTRATOR_BENCHMARK_KEY_NAME') | default('benchmark-runner', true) }}"
