openclaw_tool_search_mode: "{{ lookup('env', 'LAB_OPENCLAW_TOOL_SEARCH_MODE') | default('code', true) }}"
openclaw_telegram_enabled: "{{ lookup('env', 'LAB_OPENCLAW_TELEGRAM_ENABLED') | default('true', true) | bool }}"
openclaw_telegram_channel_name: "{{ lookup('env', 'LAB_OPENCLAW_TELEGRAM_CHANNEL_NAME') | default('telegram-bot', true) }}"
