---
- name: Bootstrap homelab server
  hosts: all
  become: true

  vars_files:
    - ../group_vars/vault.yml

  tasks:

    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600

    - name: Upgrade all packages
      ansible.builtin.apt:
        upgrade: dist

    - name: Install base packages
      ansible.builtin.apt:
        name:
          - curl
          - wget
          - git
          - vim
          - htop
          - unzip
          - jq
          - net-tools
          - ca-certificates
          - gnupg
          - lsb-release
          - software-properties-common
          - apt-transport-https
          - util-linux-extra
        state: present

    - name: Set timezone
      community.general.timezone:
        name: "{{ timezone }}"

    - name: Ensure .ssh directory exists
      ansible.builtin.file:
        path: "/home/{{ ansible_user }}/.ssh"
        state: directory
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: '0700'

    - name: Configure server baseline
      ansible.builtin.import_role:
        name: server_baseline

    - name: Install Route53 DDNS updater
      ansible.builtin.import_role:
        name: route53_ddns

    - name: Install WireGuard VPN
      ansible.builtin.import_role:
        name: wireguard

    - name: Stop retired cognitive gateway processes
      ansible.builtin.shell: |
        set -euo pipefail
        if pgrep -x cognitive-gateway >/dev/null; then
          pkill -x cognitive-gateway || true
        fi
      args:
        executable: /bin/bash
      changed_when: false

    - name: Stop and disable retired cognitive gateway units
      ansible.builtin.systemd:
        name: "{{ item }}"
        state: stopped
        enabled: false
      loop:
        - cognitive-gateway.service
        - cognitive-gateway-code.service
        - cognitive-gateway-planner.service
        - cognitive-gateway-utility.service
      failed_when: false

    - name: Remove retired cognitive gateway unit files
      ansible.builtin.file:
        path: "/etc/systemd/system/{{ item }}"
        state: absent
      loop:
        - cognitive-gateway.service
        - cognitive-gateway-code.service
        - cognitive-gateway-planner.service
        - cognitive-gateway-utility.service

    - name: Remove retired cognitive gateway artifacts
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - /etc/cognitive-gateway
        - /srv/ai-lab/cognitive-gateway

    - name: Stop retired AI stack compose projects
      ansible.builtin.shell: |
        set -euo pipefail
        for dir in /srv/ai-lab/open-webui /opt/docker/orchestrator; do
          if [[ -f "${dir}/docker-compose.yml" ]]; then
            docker compose -f "${dir}/docker-compose.yml" down -v --remove-orphans || true
          fi
        done
      args:
        executable: /bin/bash
      changed_when: false

    - name: Stop and disable retired AI stack units
      ansible.builtin.systemd:
        name: "{{ item }}"
        state: stopped
        enabled: false
      loop:
        - aider-cleanup.timer
        - aider-cleanup.service
        - orchestrator.service
        - orchestrator-cap-docs.service
        - orchestrator-cap-images.service
        - orchestrator-workspace-cleanup.timer
        - orchestrator-workspace-cleanup.service
        - orchestrator-pg-backup.timer
        - orchestrator-pg-backup.service
      failed_when: false

    - name: Remove retired AI stack unit files
      ansible.builtin.file:
        path: "/etc/systemd/system/{{ item }}"
        state: absent
      loop:
        - aider-cleanup.timer
        - aider-cleanup.service
        - orchestrator.service
        - orchestrator-cap-docs.service
        - orchestrator-cap-images.service
        - orchestrator-workspace-cleanup.timer
        - orchestrator-workspace-cleanup.service
        - orchestrator-pg-backup.timer
        - orchestrator-pg-backup.service

    - name: Remove retired AI stack runtime and data
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - /srv/ai-lab/aider
        - /etc/aider
        - /var/log/aider
        - /run/aider
        - /srv/ai-lab/orchestrator
        - /etc/orchestrator
        - /opt/docker/orchestrator
        - /opt/docker/postgres
        - /srv/ai-lab/open-webui
        - /usr/local/bin/aider-task
        - /usr/local/bin/aider-cleanup
        - /var/snap/prometheus/common/file_sd/orchestrator-targets.yml

    - name: Reload systemd after retired AI stack cleanup
      ansible.builtin.systemd:
        daemon_reload: true

    - name: Install llama.cpp with Vulkan
      ansible.builtin.import_role:
        name: llama_cpp

    - name: Configure Codex host runtime
      ansible.builtin.import_role:
        name: codex_host

    - name: Install Codex local gateway
      ansible.builtin.import_role:
        name: codex_local_gateway

    - name: Install monitoring web console
      ansible.builtin.import_role:
        name: monitor

    - name: Install observability stack
      ansible.builtin.import_role:
        name: observability
