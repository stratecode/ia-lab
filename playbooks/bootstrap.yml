---
- name: Bootstrap homelab server
  hosts: all
  become: true

  vars_files:
    - ../group_vars/vault.yml

  tasks:

    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600

    - name: Upgrade all packages
      ansible.builtin.apt:
        upgrade: dist

    - name: Install base packages
      ansible.builtin.apt:
        name:
          - curl
          - wget
          - git
          - vim
          - htop
          - unzip
          - jq
          - net-tools
          - ca-certificates
          - gnupg
          - lsb-release
          - software-properties-common
          - apt-transport-https
          - util-linux-extra
        state: present

    - name: Set timezone
      community.general.timezone:
        name: "{{ timezone }}"

    - name: Ensure .ssh directory exists
      ansible.builtin.file:
        path: "/home/{{ ansible_user }}/.ssh"
        state: directory
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: '0700'

    - name: Configure server baseline
      ansible.builtin.import_role:
        name: server_baseline

    - name: Install Route53 DDNS updater
      ansible.builtin.import_role:
        name: route53_ddns

    - name: Install WireGuard VPN
      ansible.builtin.import_role:
        name: wireguard

    - name: Stop retired cognitive gateway processes
      ansible.builtin.shell: |
        set -euo pipefail
        if pgrep -f '/srv/ai-lab/cognitive-gateway/runtime/cognitive-gateway' >/dev/null; then
          pkill -f '/srv/ai-lab/cognitive-gateway/runtime/cognitive-gateway'
        fi
      args:
        executable: /bin/bash
      changed_when: false

    - name: Remove retired cognitive gateway artifacts
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - /etc/cognitive-gateway
        - /srv/ai-lab/cognitive-gateway

    - name: Install llama.cpp with Vulkan
      ansible.builtin.import_role:
        name: llama_cpp

    - name: Install Aider coding agent
      ansible.builtin.import_role:
        name: aider

    - name: Install Orchestrator platform
      ansible.builtin.import_role:
        name: orchestrator

    - name: Install Open WebUI
      ansible.builtin.import_role:
        name: open_webui

    - name: Install monitoring web console
      ansible.builtin.import_role:
        name: monitor

    - name: Install observability stack
      ansible.builtin.import_role:
        name: observability
